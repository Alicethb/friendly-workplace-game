公司內部事務，政府無權命令重新調查"},"answer":"B","explanation":"重新調查是法定義務。主管應藉此檢視先前調查的盲點（如性別比例、漏未訪談關鍵人），確保第二次程序的嚴謹性。"},{"id":"285","role":"主管","category":"法律程序與責任","difficulty":"高難度","question":"主管在處理性騷擾申訴時，若發現「申訴不合法定程式」但可補正（如申訴書漏簽名），應如何處理？","options":{"A":"A. 逕行退件並永不理會","B":"B. 通知申訴人於 14 日內補正","C":"C. 代替申訴人補簽名以加速流程","D":"D. 直接判定申訴無效"},"answer":"B","explanation":"為保障當事人之救濟權，程序上的輕微漏失（欠缺簽章、格式不符）應給予 14 日的補正期限，不應直接退件。"},{"id":"286","role":"主管","category":"法律程序與責任","difficulty":"高難度","question":"關於職場霸凌的「協調」機制，主管在引導雙方達成共識後，必須作成何種文件？","options":{"A":"A. 僅需口頭承諾","B":"B. 應作成協調合意紀錄，並載明合意事項","C":"C. 應要求雙方簽署終身保密合約","D":"D. 應要求被害人撤銷所有健保福利"},"answer":"B","explanation":"協調合意紀錄是具有法律證明力的文件。主管應確保紀錄內容包含具體的「行為改善方案」或「道歉賠償」，以防日後反悔。"},{"id":"287","role":"主管","category":"法律程序與責任","difficulty":"高難度","question":"主管在受理職場霸凌申訴後，應於幾日內決定是否受理並書面通知申訴人？","options":{"A":"A. 3 個工作日","B":"B. 7 個工作日","C":"C. 10 個工作日","D":"D. 30 日"},"answer":"C","explanation":"10 個工作日內作成受理決定並「書面通知」。主管應遵守此法定時限，避免因延遲受理導致受害者感到被漠視。"},{"id":"288","role":"主管","category":"法律程序與責任","difficulty":"高難度","question":"機關僱用受僱者達幾人以上，其申訴處理單位應有「具備性別意識之專業人士」參與？","options":{"A":"A. 10 人","B":"B. 30 人","C":"C. 100 人","D":"D. 500 人"},"answer":"B","explanation":"30 人以上企業之申訴處理單位必須有性平專業人士。此為確保調查過程不帶有傳統性別偏見，提升決議的合規性。"},{"id":"289","role":"主管","category":"法律程序與責任","difficulty":"高難度","question":"主管若因部屬「惡意虛構事實」誣陷同僚霸凌，經調查證實後，應如何處置始符合防治規範？","options":{"A":"A. 因為受僱者有言論自由，不予處分","B":"B. 應對該惡意虛構事實之申訴人為適當之懲戒或處理","C":"C. 將被害人與申訴人一同解僱","D":"D. 要求申訴人向公司繳交 10 萬元罰款"},"answer":"B","explanation":"「申訴後處理」包含維護職場秩序。經證實為「誣陷」或「濫權申訴」者，主管得依法規對其進行懲戒，以彰顯申訴制度之公平性。"},{"id":"290","role":"主管","category":"性騷擾防治","difficulty":"高難度","question":"身為主管，當部屬「服從」了性要求後獲得調薪，這是否仍構成性騷擾？","options":{"A":"A. 否，既然已獲得利益且服從，即為雙方合意","B":"B. 是，即便被害人迫於權勢而服從，依然屬於「交換式性騷擾」","C":"C. 視調薪金額是否符合市場行情而定","D":"D. 僅屬於薪酬管理範疇，不涉及性騷擾"},"answer":"B","explanation":"交換式性騷擾的核心在於利用「職務上之地位」。只要性要求與工作利益掛鉤，不論被害人是否迫於無奈而配合，法律上皆認定成立。"},{"id":"291","role":"主管","category":"性騷擾防治","difficulty":"高難度","question":"在性騷擾防治宣導中，主管應強調的「旁觀者介入」教育，主要目的為何？","options":{"A":"A. 鼓勵員工互相監視並打小報告","B":"B. 強化目睹者具備及時採取行動協助被害人的能力，營造友善職場環境","C":"C. 訓練大家如何躲避法律責任","D":"D. 減少管理層的行政工作負擔"},"answer":"B","explanation":"旁觀者教育旨在建立企業「集體合規文化」。讓目睹者具備安全的介入技術，能早期抑制不當行為的演化。"},{"id":"292","role":"主管","category":"法律程序與責任","difficulty":"高難度","question":"職場霸凌調查報告之內容，法規明確要求應包含下列哪一項？","options":{"A":"A. 申訴人的國小畢業證書","B":"B. 行為人的過往醫療病歷","C":"C. 事實認定及理由","D":"D. 全公司的平均薪資水平"},"answer":"C","explanation":"調查報告必須詳載「事實認定」及「認定理由」。這不僅是決議的基礎，更是若未來發生法律訴訟時，法院審酌企業是否盡到正當程序的重要物證。"},{"id":"293","role":"主管","category":"職場霸凌防治","difficulty":"高難度","question":"身為主管，在霸凌案件結案後，最重要的「事後改善」責任不包含下列何者？","options":{"A":"A. 採取追蹤、考核及監督措施","B":"B. 預防報復情事發生","C":"C. 全面檢討組織文化或管理模式","D":"D. 強制要求申訴人對外宣稱一切都是誤會"},"answer":"D","explanation":"「事後改善」包含環境修復。主管應避免採取壓制言論的方式，而是應透過組織文化檢討（如重新設定管理邊界）來預防再發。"},{"id":"294","role":"主管","category":"法律程序與責任","difficulty":"高難度","question":"若媒體報導性騷擾事件時「揭露被害人姓名」，主管可告知部屬該媒體可能面臨之行政罰鍰限額為何？","options":{"A":"A. 1 萬元至 5 萬元","B":"B. 6 萬元至 60 萬元","C":"C. 10 萬元至 100 萬元","D":"D. 50 萬元至 200 萬元"},"answer":"B","explanation":"媒體違反隱私保護義務者，可處 6 萬至 60 萬元罰鍰。主管應知曉此法規以保護部屬隱私權，避免其因曝光而遭受社會輿論之二次傷害。"},{"id":"295","role":"主管","category":"法律程序與責任","difficulty":"高難度","question":"關於「最高負責人」之定義，主管在適用性工法時，下列何者「非」屬此定義之人？","options":{"A":"A. 學校校長","B":"B. 公司董事長","C":"C. 一般資深小組組長（無對外代表權）","D":"D. 機關首長"},"answer":"C","explanation":"最高負責人是指對外能代表法人、公司之人。基層主管雖有管理權，但在法律定義下並非最高負責人。此區別涉及申訴受理機關（內部或外部）。"},{"id":"296","role":"主管","category":"法律程序與責任","difficulty":"高難度","question":"主管若發現部屬涉及霸凌且經查屬實，情節重大者，雇主得於知悉結果之日起幾日內「不經預告終止契約」？","options":{"A":"A. 7 日","B":"B. 10 日","C":"C. 30 日","D":"D. 60 日"},"answer":"C","explanation":"依據勞基法與職安相關規範，針對霸凌且情節重大者，雇主得行使「懲戒解僱權」。但必須在知悉後 30 日內發動，否則將因逾越除斥期間而解僱無效。"},{"id":"297","role":"主管","category":"法律程序與責任","difficulty":"高難度","question":"職場霸凌申復調查小組中，外部專業人士應具備哪些背景資歷為佳？","options":{"A":"A. 具備財務分析或行銷背景","B":"B. 具備勞動權益、性別平等或相關事務處理經驗","C":"C. 僅需具備五年以上工作經驗即可","D":"D. 必須是其他公司的同級主管"},"answer":"B","explanation":"外部專家之職責在於提供法規與人權專業指導。具備勞權或性平背景者，能更精準判別權力濫用與正當管理的界線。"},{"id":"298","role":"主管","category":"性騷擾防治","difficulty":"高難度","question":"身為主管，當發現部屬間存在「反覆」傳送性意味電子通訊時，應注意其是否同時觸犯何法之刑事責任？","options":{"A":"A. 勞基法","B":"B. 跟蹤騷擾防制法","C":"C. 土地法","D":"D. 營業秘密法"},"answer":"B","explanation":"反覆、持續且涉及性或性別之騷擾通訊，可能構成《跟蹤騷擾防制法》之刑事罪嫌。主管除行政處置外，亦應提醒當事人刑事責任之風險。"},{"id":"299","role":"主管","category":"性騷擾防治","difficulty":"高難度","question":"主管在機關所屬公共場所發生性騷擾事件時，應採取的預防措施包含？","options":{"A":"A. 僅需加裝更多照明設備即可","B":"B. 定期檢討空間設計、照明、警報設施及監視設備之安全性","C":"C. 要求所有進出民眾簽署不騷擾切結書","D":"D. 因為是公共場所，機關無任何防治義務"},"answer":"B","explanation":"機關首長與主管對管理場所負有安全維護責任。定期檢討環境安全性（如死角監視、警報器）是法規對公共場域防治義務的要求。"},{"id":"300","role":"主管","category":"法律程序與責任","difficulty":"高難度","question":"受僱者遭受主管性騷擾而尋求「法律扶助」時，該補助之對象與範圍不包含下列何項？","options":{"A":"A. 律師代理酬金","B":"B. 訴訟期間之生活津貼（依特定規定）","C":"C. 裁判費","D":"D. 賠償給對方的和解金"},"answer":"D","explanation":"法律扶助旨在減輕被害人進行救濟的經濟負擔。補助範圍含律師費、裁判費等訴訟成本，但絕對不包含支付給行為人的和解金或損害賠償額。"}];
const $ = id => document.getElementById(id);
let questionBank = [];
let currentPlayer = null;
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let correctCount = 0;
let wrongCount = 0;
let unansweredCount = 0;
let mistakes = [];
let isAnswered = false;
let gameStartedAt = null;
let decoyPenaltySeconds = 0;
let decoyHitCount = 0;
let comboCount = 0;
let correctMissedWaves = 0;
const activeTimers = new Set();
let waveTimer = null;

function init(){
  questionBank = defaultQuestionBank.map((q,i)=>normalizeQuestion({...q, difficulty:q.difficulty||autoDifficultyForIndex(i)})).filter(Boolean);
  $('entryForm').addEventListener('submit', startGame);
  $('skipBtn').addEventListener('click', skipQuestion);
  $('showMistakesBtn').addEventListener('click', ()=>renderMistakes());
  $('backHomeBtn').addEventListener('click', ()=>{ stopRoundEffects(); switchScreen('introScreen'); });
}

function switchScreen(screenId){
  ['introScreen','gameScreen','resultScreen'].forEach(id=>$(id).classList.toggle('active', id===screenId));
  document.body.classList.toggle('in-game', screenId==='gameScreen');
  if(screenId==='introScreen') document.body.classList.remove('in-game');
  window.scrollTo({top:0,behavior:'smooth'});
}

function startGame(event){
  event.preventDefault();
  const role = document.querySelector('input[name="role"]:checked')?.value;
  const name = $('playerName').value.trim();
  const unit = $('playerUnit').value.trim();
  const agreed = $('agreeCheck').checked;
  if(!role) return alert('請先選擇身分別。');
  if(!name) return alert('請輸入姓名。');
  if(!unit) return alert('請輸入服務單位。');
  if(!agreed) return alert('請先勾選確認事項，才能開始挑戰。');
  const available = questionBank.filter(q=>q.role===role || q.role==='通用');
  const selected = selectBalancedQuestionsByDifficulty(available, SETTINGS.questionCount);
  if(!selected.ok) return alert(selected.message);
  currentPlayer = {role,name,unit};
  currentQuestions = selected.questions;
  currentIndex = 0; score = 0; correctCount = 0; wrongCount = 0; unansweredCount = 0;
  mistakes = []; isAnswered = false; comboCount = 0; decoyPenaltySeconds = 0; decoyHitCount = 0; correctMissedWaves = 0;
  gameStartedAt = new Date();
  switchScreen('gameScreen');
  renderQuestion();
}

function renderQuestion(){
  stopRoundEffects();
  isAnswered = false;
  const q = currentQuestions[currentIndex];
  $('questionCounter').textContent = `${currentIndex + 1} / ${SETTINGS.questionCount}`;
  $('scoreText').textContent = score;
  $('correctText').textContent = correctCount;
  $('wrongText').textContent = wrongCount;
  $('categoryText').textContent = q.category || '題目分類';
  $('questionText').textContent = q.question;
  renderOptionList(q);
  $('feedback').className = 'feedback';
  $('feedback').innerHTML = `請先閱讀上方固定選項區，再敲擊正確的 A／B／C／D 地鼠；假地鼠會亂入，敲到會讓作答時間 +5 秒。<span class="wave-tip-pill">同分時，總時數較少者優先</span>`;
  $('skipBtn').disabled = false;
  setupMoleRound();
  showNextWave();
}

function renderOptionList(q){
  const keys = ['A','B','C','D'].filter(k=>q.options?.[k]);
  $('optionList').innerHTML = keys.map(k=>`<div class="option-item"><span class="option-key">${k}</span><span class="option-copy">${escapeHtml(stripOptionLabel(q.options[k], k))}</span></div>`).join('');
}

function setupMoleRound(){
  const grid = $('moleGrid');
  grid.innerHTML = '';
  for(let i=0;i<HOLE_COUNT;i++){
    const card = document.createElement('button');
    card.type='button';
    card.className='hole-card waiting-hole';
    card.dataset.holeIndex=String(i);
    card.dataset.option='';
    card.dataset.decoy='';
    card.setAttribute('aria-label', `第 ${i+1} 個地鼠洞`);
    card.innerHTML='<div class="hole-shadow"></div>';
    card.addEventListener('click', event=>{
      if(isAnswered) return;
      if(card.dataset.decoy==='true') return handleDecoyHit(card,event);
      const key = card.dataset.option;
      if(key) handleMoleHit(key, card, event);
    });
    grid.appendChild(card);
  }
}

function showNextWave(){
  clearMoleTimer();
  if(isAnswered) return;
  waveTimer = registerTimer(spawnMoleWave, 180 + Math.random()*420);
}

function spawnMoleWave(){
  if(isAnswered) return;
  const q = currentQuestions[currentIndex];
  if(!q) return;
  clearVisibleMoles();
  const optionKeys = Object.keys(q.options || {}).filter(k=>q.options[k]);
  const trueCount = randomInt(1, Math.min(4, optionKeys.length));
  let trueOptions = shuffle(optionKeys).slice(0,trueCount);
  if(!trueOptions.includes(q.answer)){
    correctMissedWaves += 1;
    if(correctMissedWaves >= 2 || Math.random() < .45){
      trueOptions = trueOptions.slice(0, Math.max(0, trueOptions.length-1));
      trueOptions.push(q.answer);
      trueOptions = [...new Set(trueOptions)];
    }
  } else correctMissedWaves = 0;
  const maxDecoys = Math.max(0, HOLE_COUNT - trueOptions.length);
  const decoyCount = maxDecoys ? randomInt(1, Math.min(3, maxDecoys)) : 0;
  const items = shuffle([...trueOptions.map(optionKey=>({type:'true', optionKey})), ...Array.from({length:decoyCount},()=>({type:'decoy'}))]);
  const holes = shuffle(Array.from({length:HOLE_COUNT},(_,i)=>i));
  const visibleSeconds = getRandomVisibleSeconds();
  items.forEach((item,index)=>{
    const holeIndex = holes[index];
    const delay = Math.floor(Math.random()*520) + index*randomInt(70,160);
    registerTimer(()=>{
      if(isAnswered) return;
      if(item.type==='true') spawnTrueMole(item.optionKey,holeIndex,visibleSeconds,q);
      else spawnDecoyMole(holeIndex, visibleSeconds*(.75+Math.random()*.45));
    }, delay);
  });
  const nextDelay = Math.max(900, visibleSeconds*1000 + 950 + Math.random()*900);
  waveTimer = registerTimer(spawnMoleWave, nextDelay);
}

function spawnTrueMole(optionKey, holeIndex, visibleSeconds, q){
  const card = document.querySelector(`[data-hole-index="${holeIndex}"]`);
  if(!card || isAnswered || !card.classList.contains('waiting-hole')) return;
  card.className='hole-card showing-mole';
  card.dataset.option=optionKey;
  card.dataset.decoy='';
  card.setAttribute('aria-label', `${optionKey}. ${stripOptionLabel(q.options[optionKey], optionKey)}`);
  card.innerHTML = `<div class="hole-shadow"></div><div class="mole-choice"><div class="mole" aria-hidden="true"><div class="nose"></div><div class="mouth"></div></div><div class="answer-board true-board" title="${optionKey}. ${escapeHtml(stripOptionLabel(q.options[optionKey], optionKey))}"><div class="answer-key">${optionKey}</div></div><div class="mole-countdown" aria-hidden="true"><span style="animation-duration:${visibleSeconds}s"></span></div></div>`;
  registerTimer(()=>{
    if(isAnswered || card.dataset.option!==optionKey) return;
    card.classList.add('mole-hide');
    registerTimer(()=>{ if(!isAnswered && card.dataset.option===optionKey) resetHoleCard(card); }, 340);
  }, visibleSeconds*1000);
}

function spawnDecoyMole(holeIndex, visibleSeconds){
  const card = document.querySelector(`[data-hole-index="${holeIndex}"]`);
  if(!card || isAnswered || !card.classList.contains('waiting-hole')) return;
  const texts = ['我只是路過','本案存查','先別敲我','今天不加班','加會解析室','我在跑公文','請查照','同理心補件中','答案還沒到'];
  const txt = texts[Math.floor(Math.random()*texts.length)];
  card.className='hole-card showing-mole decoy-hole';
  card.dataset.option='';
  card.dataset.decoy='true';
  card.setAttribute('aria-label', `假地鼠：${txt}`);
  card.innerHTML = `<div class="hole-shadow"></div><div class="mole-choice"><div class="mole" aria-hidden="true"><div class="nose"></div><div class="mouth"></div></div><div class="answer-board decoy-board"><span class="decoy-text">${escapeHtml(txt)}</span></div><div class="mole-countdown" aria-hidden="true"><span style="animation-duration:${visibleSeconds}s"></span></div></div>`;
  registerTimer(()=>{
    if(isAnswered || card.dataset.decoy!=='true') return;
    card.classList.add('mole-hide');
    registerTimer(()=>{ if(!isAnswered && card.dataset.decoy==='true') resetHoleCard(card); }, 340);
  }, visibleSeconds*1000);
}

function handleMoleHit(selectedKey, card, event){
  if(isAnswered) return;
  isAnswered = true;
  stopRoundEffects();
  $('skipBtn').disabled = true;
  const q = currentQuestions[currentIndex];
  const isCorrect = selectedKey === q.answer;
  showHammer(card,event);
  card.classList.remove('showing-mole','waiting-hole');
  card.classList.add(isCorrect ? 'hit-correct' : 'hit-wrong');
  const effect = document.createElement('div');
  effect.className = isCorrect ? 'hit-star' : 'wrong-smoke';
  effect.textContent = isCorrect ? '⭐💫' : '💨💨😵';
  card.appendChild(effect);
  if(!isCorrect){
    const panic=document.createElement('div'); panic.className='panic-mark'; panic.textContent='？！'; card.appendChild(panic);
    const banana=document.createElement('div'); banana.className='banana-slip'; banana.textContent='🍌'; card.appendChild(banana);
  }
  disableMoles(card);
  if(isCorrect){
    score += SETTINGS.pointsPerQuestion; correctCount += 1; comboCount += 1;
    $('feedback').className='feedback correct';
    $('feedback').innerHTML = '答對了！你是友善職場守護者！' + (comboCount>=2 ? `<span class="combo-pill">🔥 連續答對 ${comboCount} 題</span>` : '');
  }else{
    wrongCount += 1; comboCount = 0;
    mistakes.push({number:currentIndex+1, question:q.question, category:q.category, difficulty:q.difficulty, selectedKey, selectedText:q.options[selectedKey], answerKey:q.answer, answerText:q.options[q.answer], explanation:q.explanation});
    $('feedback').className='feedback wrong';
    $('feedback').textContent='再想想，友善職場需要更多同理與尊重。';
    document.querySelector('#gameScreen .card')?.classList.add('shake-once');
    setTimeout(()=>document.querySelector('#gameScreen .card')?.classList.remove('shake-once'),420);
  }
  updateStats();
  setTimeout(nextQuestion, SETTINGS.answerDelaySeconds*1000);
}

function handleDecoyHit(card,event){
  if(isAnswered || card.dataset.decoy!=='true') return;
  decoyHitCount += 1;
  decoyPenaltySeconds += DECOY_PENALTY_SECONDS;
  card.dataset.decoy='hit';
  showHammer(card,event);
  card.classList.add('decoy-hit');
  const bubble=document.createElement('div'); bubble.className='time-penalty-bubble'; bubble.textContent='+5 秒'; card.appendChild(bubble);
  $('feedback').className='feedback wrong';
  $('feedback').innerHTML = `敲到假地鼠，本題還可以繼續作答，但總作答時間 +5 秒。<span class="wave-tip-pill">目前假地鼠加秒：+${decoyPenaltySeconds} 秒</span>`;
  registerTimer(()=>{ if(card.classList.contains('decoy-hit')) resetHoleCard(card); }, 650);
}

function skipQuestion(){
  if(isAnswered) return;
  isAnswered = true;
  stopRoundEffects();
  unansweredCount += 1;
  comboCount = 0;
  const q = currentQuestions[currentIndex];
  mistakes.push({number:currentIndex+1, question:q.question, category:q.category, difficulty:q.difficulty, selectedKey:'未作答', selectedText:'未作答', answerKey:q.answer, answerText:q.options[q.answer], explanation:q.explanation});
  $('feedback').className='feedback skip';
  $('feedback').textContent='本題已跳過，請查看解析補強觀念。';
  $('skipBtn').disabled=true;
  updateStats();
  setTimeout(nextQuestion, SETTINGS.answerDelaySeconds*1000);
}

function nextQuestion(){
  stopRoundEffects();
  currentIndex += 1;
  if(currentIndex >= SETTINGS.questionCount) finishGame(); else renderQuestion();
}

function finishGame(){
  stopRoundEffects();
  const finishedAt = new Date();
  const actualDurationSeconds = gameStartedAt ? Math.round((finishedAt - gameStartedAt)/1000) : 0;
  const durationSeconds = actualDurationSeconds + decoyPenaltySeconds;
  const maxScore = SETTINGS.questionCount * SETTINGS.pointsPerQuestion;
  const result = {role:currentPlayer.role,name:currentPlayer.name,unit:currentPlayer.unit,score,correctCount,wrongCount,unansweredCount,totalQuestions:SETTINGS.questionCount,pointsPerQuestion:SETTINGS.pointsPerQuestion,maxScore,scorePercent:Math.round((score/Math.max(1,maxScore))*100),completedAt:formatTaipeiTime(finishedAt),actualDurationSeconds,actualDurationText:formatDurationText(actualDurationSeconds),decoyPenaltySeconds,decoyHitCount,durationSeconds,durationText:formatDurationText(durationSeconds),title:getTitle(score,maxScore)};
  renderResult(result);
  switchScreen('resultScreen');
  submitToGoogleSheet(result);
}

function renderResult(result){
  $('mistakesPanel').classList.add('hidden');
  const needsMorePractice = result.title === '友善職場觀念需再加強';
  const lowScoreSceneHtml = '';
  $('resultContent').innerHTML = `<div class="result-header"><h2>${needsMorePractice?'挑戰完成，準備補充友善能量！':'挑戰完成！'}</h2><div class="score-circle"><div><strong>${result.score}</strong><span>分 / ${result.maxScore} 分</span></div></div><div class="title-ribbon">${escapeHtml(result.title)}</div></div><div id="submitNotice" class="submit-notice pending">成績送出中，請停留約 3 秒再關閉畫面。</div><div class="result-grid"><div class="result-item"><small>姓名</small><strong>${escapeHtml(result.name)}</strong></div><div class="result-item"><small>服務單位</small><strong>${escapeHtml(result.unit)}</strong></div><div class="result-item"><small>身分別</small><strong>${escapeHtml(result.role)}</strong></div><div class="result-item"><small>完成時間</small><strong>${escapeHtml(result.completedAt)}</strong></div><div class="result-item"><small>分數</small><strong>${result.score}</strong></div><div class="result-item"><small>答對 / 答錯 / 未作答</small><strong>${result.correctCount} / ${result.wrongCount} / ${result.unansweredCount}</strong></div><div class="result-item"><small>實際作答耗時</small><strong>${result.actualDurationText}</strong></div><div class="result-item"><small>假地鼠加秒</small><strong>${result.decoyHitCount} 次，+${result.decoyPenaltySeconds} 秒</strong></div><div class="result-item"><small>排名計算總時數</small><strong>${result.durationText}</strong></div></div><p class="slogan">公路局雲嘉南分局關心您</p>`;
  $('showMistakesBtn').classList.toggle('hidden', mistakes.length===0);
}

function renderMistakes(){
  const panel=$('mistakesPanel');
  panel.classList.remove('hidden');
  if(!mistakes.length){ panel.innerHTML='<h3>錯題解析</h3><p>本次沒有錯題，表現很棒！</p>'; return; }
  panel.innerHTML = `<h3>錯題解析</h3><div class="mistake-list">${mistakes.map(item=>`<div class="mistake-item"><h4>第 ${item.number} 題｜${escapeHtml(item.category)}｜${escapeHtml(item.difficulty||'')}</h4><p><strong>題目：</strong>${escapeHtml(item.question)}</p><p><strong>你的答案：</strong>${formatOptionForDisplay(item.selectedKey,item.selectedText)}</p><p><strong>正確答案：</strong>${formatOptionForDisplay(item.answerKey,item.answerText)}</p><p><strong>解析：</strong>${escapeHtml(item.explanation)}</p></div>`).join('')}</div>`;
  panel.scrollIntoView({behavior:'smooth',block:'start'});
}

function submitToGoogleSheet(result){
  const notice = $('submitNotice');
  if(!GOOGLE_SHEET_WEB_APP_URL){ if(notice){notice.className='submit-notice fail';notice.textContent='尚未設定成績接收網址，請通知承辦人。'}; return; }
  const recordId = createRecordId(result);
  const params = new URLSearchParams({token:GOOGLE_SHEET_SUBMIT_TOKEN,recordId,finishedAt:result.completedAt,playerName:result.name,playerUnit:result.unit,role:result.role,score:String(result.score),correctCount:String(result.correctCount),wrongCount:String(result.wrongCount),skipCount:String(result.unansweredCount),actualSeconds:String(result.actualDurationSeconds),decoyHitCount:String(result.decoyHitCount),decoyPenaltySeconds:String(result.decoyPenaltySeconds),rankingSeconds:String(result.durationSeconds),questionBankVersion:QUESTION_BANK_VERSION,userAgent:navigator.userAgent||''});
  const img = new Image();
  let done=false;
  const markDone = () => { if(done) return; done=true; if(notice){notice.className='submit-notice done'; notice.textContent='成績送出請求已發出。請確認停留約 3 秒後再關閉畫面。'} };
  img.onload = markDone;
  img.onerror = markDone;
  img.src = `${GOOGLE_SHEET_WEB_APP_URL}?${params.toString()}`;
  setTimeout(markDone, 3000);
}

function createRecordId(result){
  return `${result.unit||'unit'}-${result.name||'unknown'}-${Date.now()}-${Math.random().toString(36).slice(2,8)}`;
}
function updateStats(){ $('scoreText').textContent=score; $('correctText').textContent=correctCount; $('wrongText').textContent=wrongCount; }
function disableMoles(exceptCard){ document.querySelectorAll('.hole-card').forEach(card=>{ if(card!==exceptCard) card.classList.add('disabled'); }); }
function resetHoleCard(card){ card.className='hole-card waiting-hole'; card.dataset.option=''; card.dataset.decoy=''; card.innerHTML='<div class="hole-shadow"></div>'; }
function clearVisibleMoles(){ document.querySelectorAll('.hole-card.showing-mole,.hole-card.decoy-hole,.hole-card.decoy-hit,.hole-card.disabled,.hole-card.hit-correct,.hole-card.hit-wrong').forEach(resetHoleCard); }
function clearMoleTimer(){ if(waveTimer){ clearTimeout(waveTimer); activeTimers.delete(waveTimer); waveTimer=null; } }
function registerTimer(callback, delay){ const id=setTimeout(()=>{activeTimers.delete(id); callback();}, delay); activeTimers.add(id); return id; }
function stopRoundEffects(){ activeTimers.forEach(id=>clearTimeout(id)); activeTimers.clear(); waveTimer=null; clearVisibleMoles(); }
function getRandomVisibleSeconds(){ const jitter = SETTINGS.moleJitterPercent/100; return Math.max(.75, SETTINGS.moleVisibleSeconds * (1 + (Math.random()*2-1)*jitter)); }
function randomInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function showHammer(card,event){ const hammer=document.createElement('div'); hammer.className='hammer'; hammer.textContent='🔨'; const rect=card.getBoundingClientRect(); const x=(event?.clientX ?? (rect.left+rect.width/2))-rect.left; const y=(event?.clientY ?? (rect.top+rect.height/2))-rect.top; hammer.style.left=Math.max(8,Math.min(rect.width-42,x-10))+'px'; hammer.style.top=Math.max(0,Math.min(rect.height-50,y-42))+'px'; card.appendChild(hammer); setTimeout(()=>hammer.remove(),480); if(navigator.vibrate) navigator.vibrate(25); }
function getTitle(value,maxScore){ const percent=Math.round((Number(value)/Math.max(1,Number(maxScore)))*100); if(percent>=92) return '友善職場金牌守護者'; if(percent>=80) return '友善職場實踐者'; if(percent>=60) return '友善職場學習者'; return '友善職場觀念需再加強'; }
function formatTaipeiTime(date){ return date.toLocaleString('zh-TW',{timeZone:'Asia/Taipei',hour12:false}); }
function formatDurationText(seconds){ const total=Math.max(0,Math.round(Number(seconds)||0)); const m=Math.floor(total/60); const s=total%60; return `${m}分${String(s).padStart(2,'0')}秒`; }
function escapeHtml(v){ return String(v??'').replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch])); }
function stripOptionLabel(value,key=''){ let text=String(value??'').trim(); const keys=key?[String(key).toUpperCase()]:['A','B','C','D']; keys.forEach(letter=>{ text=text.replace(new RegExp('^\\s*'+letter+'\\s*[\\.．、:：\\)）]\\s*','i'),'').trim(); }); return text; }
function formatOptionForDisplay(key,value){ if(key==='未作答') return '未作答'; return `${escapeHtml(key)}. ${escapeHtml(stripOptionLabel(value,key))}`; }
function autoDifficultyForIndex(i){ return DIFFICULTY_LEVELS[i%DIFFICULTY_LEVELS.length]; }
function normalizeQuestion(q){ const options=q.options||{}; const answer=String(q.answer||q['正確答案']||'').trim().toUpperCase().replace(/[^ABCD]/g,'').slice(0,1); return {id:q.id||'',role:q.role||q['身分別']||'通用',category:q.category||q['題目分類']||'',difficulty:normalizeDifficulty(q.difficulty||q['題目難度']||''),question:q.question||q['題目']||'',options:{A:stripOptionLabel(options.A??q['選項A']??'', 'A'),B:stripOptionLabel(options.B??q['選項B']??'', 'B'),C:stripOptionLabel(options.C??q['選項C']??'', 'C'),D:stripOptionLabel(options.D??q['選項D']??'', 'D')},answer,explanation:q.explanation||q['解析']||''}; }
function normalizeDifficulty(v){ const raw=String(v||'').trim(); const map={'低':'低難度','低難度':'低難度','簡單':'低難度','中':'中難度','中難度':'中難度','普通':'中難度','中高':'中高難度','中高難度':'中高難度','較難':'中高難度','高':'高難度','高難度':'高難度','困難':'高難度'}; return map[raw] || raw || '低難度'; }
function selectBalancedQuestionsByDifficulty(available,totalCount){
  if(!available.length) return {ok:false,questions:[],message:'目前題庫沒有符合此身分別的題目。'};
  const selected=[]; const missing=[];
  DIFFICULTY_LEVELS.forEach(level=>{ const need=SETTINGS.difficultyDistribution[level]||0; const pool=shuffle(available.filter(q=>q.difficulty===level)); if(pool.length<need) missing.push(`${level}需要 ${need} 題，目前只有 ${pool.length} 題`); selected.push(...pool.slice(0,need)); });
  if(missing.length){ const fallback=shuffle(available).slice(0,totalCount); if(fallback.length<totalCount) return {ok:false,questions:[],message:'題庫數量不足，無法開始遊戲。'}; return {ok:true,questions:fallback}; }
  return {ok:true,questions:shuffle(selected).slice(0,totalCount)};
}
const LOW_SCORE_HTML = ``;
init();
</script>
