const defaultQuestionBank = [{"id":"1","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"若勞工在執行職務時，遭受雇主「逾越業務必要範圍」且「持續性」的冷落或孤立，根據 2025 年新修規範，這主要符合下列哪項定義？","options":{"A":"交換式性騷擾","B":"職場霸凌","C":"正常績效管理","D":"敵意式性騷擾"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》第 2 條，職場霸凌定義包含人員利用職務或權勢，逾越業務必要範圍，持續以冷落、孤立等不當言詞或行為，致他人身心健康受損。"},{"id":"2","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"受僱者若在「非工作時間」遭受「同一事業單位」之同仁性騷擾，且該行為具有持續性並影響其工作表現時，應優先適用哪一部法律進行申訴？","options":{"A":"性騷擾防治法","B":"跟蹤騷擾防制法","C":"性別平等工作法","D":"社會秩序維護法"},"answer":"C","explanation":"根據《性別平等工作法》第 12 條第 3 項，受僱者於非工作時間，遭受同一事業單位之人之持續性性騷擾，仍適用性工法之規定。"},{"id":"3","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"非主管人員若發現公司首長（最高負責人）為性騷擾行為人時，依規定可以直接向哪個機關提起申訴？","options":{"A":"公司內部的人事部門","B":"直轄市、縣（市）主管機關","C":"警察局","D":"勞動部職業安全衛生署"},"answer":"B","explanation":"根據《性別平等工作法》第 32 條之 1 及《職場霸凌防治措施準則》第 6 條，若被申訴人為最高負責人，受僱者得逕向地方主管機關提起申訴。"},{"id":"4","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"關於職場霸凌的申訴期限，若被申訴人為「利用權勢」的主管，勞工最遲應於離職之日起多久內提出申訴？","options":{"A":"6個月","B":"1年","C":"2年","D":"3年"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》第 8 條及《職安法》第 22 條之 3，被申訴人屬利用權勢者，勞工得於離職之日起一年內提出申訴。"},{"id":"5","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"在性騷擾申訴調查程序中，關於「當事人對質」的規定，下列敘述何者正確？","options":{"A":"為了釐清真相，調查小組應強制雙方面對面辯論","B":"調查過程應保護當事人隱私，不得令當事人或協助調查人對質","C":"只要有一方同意，就可以進行對質","D":"僅主管可以要求對質，非主管人員不行"},"answer":"B","explanation":"根據《工作場所性騷擾防治措施準則》第 16 條及《職場霸凌防治措施準則》第 16 條，調查過程應避免重複詢問，且不得令當事人間對質，以保護隱私與避免二次傷害。"},{"id":"6","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"雇主在知悉性騷擾情形後，應採取「立即有效之糾正及補救措施」。若受僱者（被害人）無意願提起正式申訴，雇主可以採取什麼行動？","options":{"A":"既然被害人不申訴，雇主就不具備任何防治責任","B":"雇主仍應進行必要的事實釐清，並提供被害人所需的諮詢或醫療轉介","C":"強制被害人必須填寫申訴書才能處理","D":"直接將行為人開除"},"answer":"B","explanation":"根據《工作場所性騷擾防治措施準則》第 6 條，雇主非因接獲申訴而知悉性騷擾時，仍應釐清事實、告知被害人權益，並按其意願調整工作或提供心理諮商。"},{"id":"7","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"若一名勞工因遭受職場霸凌導致法律訴訟，受司法機關通知到庭參與程序，雇主「應」給予何種假別？","options":{"A":"事假","B":"病假","C":"公假","D":"特別休假"},"answer":"C","explanation":"根據《性別平等工作法》第 27 條第 4 項，被害人因性騷擾致生法律訴訟，於司法機關通知到庭期間，雇主應給予公假。"},{"id":"8","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"下列何者「不屬於」職場霸凌定義中的樣態？","options":{"A":"主管在公開會議中辱罵員工","B":"刻意分配與員工能力明顯不符的低階助理工作，意圖逼退","C":"雇主基於業務需要，要求員工在合理範圍內加班","D":"故意不讓員工參與必要的重要會議"},"answer":"C","explanation":"職場霸凌需符合「逾越業務上必要且合理範圍」之條件。合理的績效要求或業務加班不視為霸凌。"},{"id":"9","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"事業單位僱用勞工人數達多少人以上時，依法應訂定「職場霸凌防治措施、申訴及懲戒處理規範」？","options":{"A":"10人","B":"30人","C":"50人","D":"100人"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》第 6 條，僱用勞工人數在 30 人以上之雇主應訂定防治措施規範。"},{"id":"10","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"性騷擾申訴案件受理後，法律規定的標準處理期限為多久？","options":{"A":"1個月內結案，不得延長","B":"2個月內完成調查，必要時得延長1個月","C":"3個月內完成調查，不得延長","D":"無時間限制"},"answer":"B","explanation":"根據《工作場所性騷擾防治措施準則》第 18 條，雇主應自接獲申訴翌日起 2 個月內結案，必要時得延長 1 個月。"},{"id":"11","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"在職場性騷擾調查中，所謂「合理被害人」標準是指什麼？","options":{"A":"只要被害人覺得不舒服就是性騷擾","B":"考量一般人處於相同之背景、關係下，是否會有相同的受侵犯感受","C":"只要行為人沒有性意圖就不算性騷擾","D":"以公司最高負責人的認知為準"},"answer":"B","explanation":"調查時會參考「合理被害人」標準，即評估一般人在相同環境下對該言行是否會感到冒犯，而非全然僅憑被害人個人主觀感受。"},{"id":"12","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"若非主管人員因申訴職場性騷擾而被雇主「降調」或「減薪」，雇主此舉違反了哪項法律原則？","options":{"A":"誠實信用原則","B":"報復禁止原則","C":"比例原則","D":"契約自由原則"},"answer":"B","explanation":"根據《性別平等工作法》第 36 條及《職場霸凌防治措施準則》第 20 條，雇主不得因勞工提出申訴而給予不利之處分。"},{"id":"13","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"性騷擾防治法規中，關於「權勢性騷擾」的處罰，下列敘述何者正確？","options":{"A":"罰鍰與一般性騷擾相同","B":"加重其刑至二分之一","C":"僅需口頭警告","D":"不需要負損害賠償責任"},"answer":"B","explanation":"根據《性騷擾防治法》第 27 條，對他人為權勢性騷擾者，加重其刑至二分之一。"},{"id":"14","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"受僱者若遭受性騷擾而向行為人請求懲罰性賠償金，若行為人為「最高負責人」，法院最高得酌定損害額幾倍之賠償金？","options":{"A":"1倍","B":"3倍","C":"5倍","D":"10倍"},"answer":"C","explanation":"根據《性別平等工作法》第 27 條，行為人為最高負責人時，被害人得請求損害額 3 倍至 5 倍之懲罰性賠償金。"},{"id":"15","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"職場霸凌申訴成立與否之決定，應由公司內的哪個單位負責審議？","options":{"A":"工會","B":"申訴處理單位","C":"福利委員會","D":"董事會"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》第 9 條，申訴處理單位負責審議調查報告並作成成立與否之決定。"},{"id":"16","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"若勞工對公司內部的職場霸凌申訴調查結果不服，得於收到通知之次日起幾日內提出「申復」？","options":{"A":"10日","B":"15日","C":"30日","D":"60日"},"answer":"C","explanation":"根據《職場霸凌防治措施準則》第 22 條，當事人不服申訴決定，得於 30 日內提出申復，且同一事件以一次為限。"},{"id":"17","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"關於雇主辦理職場霸凌防治教育訓練，下列對象中何者應「優先」實施？","options":{"A":"剛到職的新進員工","B":"所有的工讀生","C":"擔任主管職務者及負責申訴調查之人員","D":"已經退休的員工"},"answer":"C","explanation":"根據《職場霸凌防治措施準則》第 6 條，教育訓練應優先對各級主管、負責及參與申訴調查的人員實施。"},{"id":"18","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"如果行為人「反覆」以電子通訊對特定人進行違反意願且「與性有關」之騷擾，致使對方畏怖並影響生活，這可能同時涉及哪兩部法律？","options":{"A":"職安法與民法","B":"性騷擾防治法與跟蹤騷擾防制法","C":"性別平等教育法與刑法","D":"社會秩序維護法與勞基法"},"answer":"B","explanation":"這種行為符合性騷擾樣態，若涉及反覆持續且與性有關之追求或跟蹤，則亦符合《跟蹤騷擾防制法》之定義。"},{"id":"19","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"依據《性別平等工作法》，雇主對於申訴案件的處理結果，必須通知哪個機關？","options":{"A":"內政部","B":"地方政府（勞務提供地之主管機關）","C":"財政部稅務局","D":"衛生福利部"},"answer":"B","explanation":"雇主應按規定將性騷擾申訴處理結果通知被害人勞務提供地之直轄市或縣（市）主管機關。"},{"id":"20","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"職場霸凌的「調查小組」成員中，關於「外部專業人士」的比例規定為何？","options":{"A":"至少一人","B":"不得少於三分之一","C":"不得少於二分之一","D":"必須全部都是外部人員"},"answer":"C","explanation":"根據《職場霸凌防治措施準則》第 14 條，僱用勞工 100 人以上之雇主，調查小組之外部專業人士比例不得少於二分之一。"},{"id":"21","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"若員工惡意虛構事實誣陷同事職場霸凌，經調查證實後，雇主應如何處理？","options":{"A":"這是被害人的言論自由，不予處理","B":"應對該虛構事實的申訴人為適當之懲戒或處理","C":"依然要懲罰被誣陷的同事，以示公正","D":"雇主只能私下勸告"},"answer":"B","explanation":"法規明定若經調查證實申訴人有惡意虛構事實之情形，雇主應對其進行懲戒，以維護組織纪律。"},{"id":"22","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"在性騷擾防治的法規中，「交換式性騷擾」的特徵是什麼？","options":{"A":"行為人單方面地對被害人毛手毛腳","B":"行為人以提供職務利益（如考績、陞遷）作為被害人服從性要求的條件","C":"行為人在辦公室貼色情海報","D":"雙方同意的職場戀情"},"answer":"B","explanation":"交換式性騷擾是指以被害人對性行為的順服或拒絕，作為獲得或喪失工作權益的條件。"},{"id":"23","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"受僱者遭受性騷擾後若需法律扶助，可以依據哪個辦法申請協助？","options":{"A":"勞基法","B":"性別平等工作法律扶助辦法","C":"職場霸凌防治措施準則","D":"公務人員請假規則"},"answer":"B","explanation":"為保障被害人權益，政府訂有《性別平等工作法律扶助辦法》提供訴訟輔助。"},{"id":"24","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"下列哪項不是雇主應設置的性騷擾申訴管道必要項目？","options":{"A":"專線電話","B":"專用電子信箱","C":"行為人的私人住址","D":"傳真"},"answer":"C","explanation":"申訴管道應包含電話、傳真、信箱等公共指定管道，而非個人私隱資訊。"},{"id":"25","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"職場霸凌案件調查完成後，調查報告的處理建議「不應」包含下列哪項？","options":{"A":"建議對行為人之懲處方式","B":"被害人之隱私保護措施","C":"建議被害人自行離職","D":"預防霸凌再次發生的措施"},"answer":"C","explanation":"調查報告應旨在解決問題與保護被害人，絕非逼迫被害人離職。"},{"id":"26","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"依據 2025 年新法，若公司僱用受僱者達幾人以上，應設有「性別意識之專業人士」參與申訴處理單位？","options":{"A":"10人","B":"30人","C":"5人","D":"全部公司都要"},"answer":"B","explanation":"僱用受僱者 30 人以上之機關/雇主，其申訴處理單位成員應有具備性別意識之專業人士。"},{"id":"27","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"若一名勞工因遭受霸凌感到身心受創，雇主僱用人數達 500 人以上者，應提供至少幾次的心理諮商協助？","options":{"A":"1次","B":"2次","C":"5次","D":"10次"},"answer":"B","explanation":"根據《工作場所性騷擾防治措施準則》第 6 條及相關指導手冊，大型雇主應視被害人請求提供至少 2 次心理諮商。"},{"id":"28","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"職場霸凌調查小組成員在何種情況下應「自行迴避」？","options":{"A":"與當事人是普通同事","B":"曾在同一個部門工作","C":"本人為申訴人或與其有配偶、四親等內血親關係","D":"認同申訴人的政治立場"},"answer":"C","explanation":"為確保調查公正，成員若為當事人或有近親關係者應自行迴避。"},{"id":"29","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"性騷擾申訴人可以在什麼時間點撤回申訴？","options":{"A":"任何時間都可以，且撤回後可以無限次重新申訴","B":"調查小組成立前","C":"決議通知書送達前","D":"案發後 24 小時內"},"answer":"C","explanation":"申訴人得於決議通知書送達前以書面撤回申訴，但撤回後除非有新證據，否則不得就同一事由再行申訴。"},{"id":"30","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"若機關首長涉及性騷擾行為且「情節重大」，上級機關於調查期間得採取的先行措施為何？","options":{"A":"直接開除","B":"停止或調整其職務","C":"扣發一年薪資","D":"強制公開道歉"},"answer":"B","explanation":"根據《性別平等工作法》第 32 條之 3，為避免權勢影響調查，上級機關得先行停止或調整首長職務。"},{"id":"31","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"受僱者若在執行職務時遭「不特定人」（如客戶）性騷擾，應適用哪部法規進行處罰？","options":{"A":"性別平等工作法","B":"性騷擾防治法","C":"跟蹤騷擾防制法","D":"職業安全衛生法"},"answer":"B","explanation":"受僱者遭受不特定人性騷擾，關於調查、調解及處罰事項，適用《性騷擾防治法》。"},{"id":"32","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"事業單位對職場霸凌防治措施的「紀錄保存」期限為多久？","options":{"A":"1年","B":"3年","C":"5年","D":"永久保存"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》第 26 條，預防、申訴、調查等處理過程紀錄應留存 3 年。"},{"id":"33","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"職場霸凌定義中的「持續性」，是指行為人必須如何？","options":{"A":"一次性大聲說話就算","B":"反覆或持續地進行不當言行，致人受害","C":"每天準時打卡進行","D":"僅限於實體肢體衝突"},"answer":"B","explanation":"霸凌通常具有持續性的特徵，與偶發性的摩擦有所區別。"},{"id":"34","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"若員工因「性傾向」在工作場所遭受歧視性言詞，使其感受敵意環境，這屬於哪種性騷擾類型？","options":{"A":"交換式性騷擾","B":"敵意式性騷擾","C":"權勢性騷擾","D":"非工作時間性騷擾"},"answer":"B","explanation":"敵意式性騷擾包含以性別、性傾向相關歧視言行損害他人人格尊嚴或造成敵意環境。"},{"id":"35","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"職場霸凌申訴處理單位的成員比例，關於「性別」有何限制？","options":{"A":"必須全部是女性","B":"必須全部是男性","C":"任一性別比例不得少於三分之一","D":"沒有限制"},"answer":"C","explanation":"根據《職場霸凌防治措施準則》第 9 條，申訴處理單位任一性別比例不得少於三分之一。"},{"id":"36","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"若公司未設申訴處理單位（規模較小），非主管同仁遇到霸凌時該如何處理？","options":{"A":"法律規定小公司不用處理","B":"雇主仍負有調查義務，可委由外部專家協助處理","C":"直接去法院告雇主","D":"只能自行離職"},"answer":"B","explanation":"微型企業雖未強制設單位，但仍負防治責任，可參照法規精神委請外部人士協助調查。"},{"id":"37","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"性騷擾申訴調查報告的內容「不包含」下列哪項？","options":{"A":"訪談過程紀錄","B":"行為人的銀行帳戶明細","C":"事實認定及理由","D":"處理建議"},"answer":"B","explanation":"調查報告應針對事件本身之事實、過程及認定，不應調查與案情無關之私人財務資訊。"},{"id":"38","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"在性騷擾事件中，雇主與行為人對被害人負擔什麼法律責任？","options":{"A":"行為人負責就好","B":"雇主負擔全部刑事責任","C":"雇主與行為人負連帶損害賠償責任","D":"雇主僅負擔道德責任"},"answer":"C","explanation":"根據《性別平等工作法》第 27 條，雇主與行為人連帶負損害賠償責任，除非雇主證明已善盡防治責任。"},{"id":"39","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"若一名員工因「拒絕」同事追求，隨後在工作中被該同事刻意隱瞞資訊導致出錯，這屬於什麼行為？","options":{"A":"正常的工作疏失","B":"職場霸凌中「破壞工作」的樣態","C":"單純的溝通不良","D":"雇主的經營權行使"},"answer":"B","explanation":"刻意隱瞞資訊或提供不實資訊以阻礙工作，是職場霸凌的典型樣態之一。"},{"id":"40","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"性別平等工作法規定的「最高負責人」包含下列何者？","options":{"A":"部門經理","B":"機關首長或公司董事長","C":"一般資深員工","D":"工會主席"},"answer":"B","explanation":"最高負責人指機關首長、學校校長、公司董事長或與該等職務相當之人。"},{"id":"41","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"性騷擾調查小組的「外部專業人士」主要應具備哪方面的知能？","options":{"A":"財務審計","B":"勞動權益或性別平等意識","C":"行銷公關","D":"電腦程式設計"},"answer":"B","explanation":"外部專家需具備性別意識或相關事務處理經驗，以確保調查專業性。"},{"id":"42","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"在申復程序中，若發現原調查有「應迴避而未迴避」之情形，應如何處理？","options":{"A":"視為有效，繼續執行","B":"視為重大瑕疵，應組成申復調查小組再行調查","C":"直接判定被申訴人有罪","D":"要求申訴人撤回"},"answer":"B","explanation":"違反利益迴避規定屬調查程序重大瑕疵，應重新調查。"},{"id":"43","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"關於「跟蹤騷擾」的定義，下列敘述何者錯誤？","options":{"A":"必須是反覆或持續性的行為","B":"必須與性或性別有關","C":"只要一次不小心的偶遇就算","D":"違反對方意願且使人心生畏怖"},"answer":"C","explanation":"跟蹤騷擾需符合「反覆或持續」、「與性或性別有關」且「違反意願」等要件。"},{"id":"44","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"事業單位應多久檢討一次工作場所內易發生性騷擾的空間設計？","options":{"A":"每天","B":"每月","C":"定期檢討","D":"發生事情後才檢討"},"answer":"C","explanation":"雇主應定期檢討環境安全性，預防性騷擾發生。"},{"id":"45","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"受僱者申訴性騷擾時，若「申訴書」格式不合規定但可以補正，雇主應通知其於幾日內補正？","options":{"A":"3日","B":"7日","C":"14日","D":"30日"},"answer":"C","explanation":"若申訴書不合法定程式但可補正，雇主應通知其於 14 日內補正。"},{"id":"46","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"關於職場霸凌中的「要求過低」樣態，指的是什麼？","options":{"A":"讓高階人才處理低階助理工作，意圖羞辱","B":"讓員工提早下班","C":"不給員工任何壓力","D":"讓新進人員做最簡單的工作"},"answer":"A","explanation":"刻意的大材小用，以此打擊勞工自尊心或逼其離職，屬於霸凌樣態。"},{"id":"47","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"若被申訴人為「各級主管」，受僱者離職後對性騷擾事件提起申訴的「時效」為何？","options":{"A":"知悉起2年，行為終了起5年","B":"知悉起3年，行為終了起7年","C":"離職之日起1年內，但逾10年者不予受理","D":"離職之日起10年內"},"answer":"C","explanation":"針對權勢性騷擾，離職後仍有 1 年申訴期，但行為終了逾 10 年者因裁處權消滅而不受理。"},{"id":"48","role":"非主管","category":"性騷擾防治","difficulty":"低難度","question":"在性騷擾防治宣導中，所謂「旁觀者介入」課程的目的是什麼？","options":{"A":"鼓勵大家去八卦別人的私事","B":"讓目睹者具備能力及時採取行動協助被害人","C":"讓旁觀者一起參與霸凌","D":"訓練大家如何躲避調查"},"answer":"B","explanation":"旁觀者教育旨在建立友善職場，讓第三方能及時給予支持並防範惡化。"},{"id":"49","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"若公司接獲檢舉有疑似霸凌，但被害勞工「拒絕配合調查」，調查小組應如何處理？","options":{"A":"直接判定案件不成立","B":"告知其限期配合，若屆期仍未配合，得依現有證作作成報告","C":"強制將被害人拘提","D":"停止所有工作直到其配合"},"answer":"B","explanation":"若當事人無正當理由拒絕調查，經限期仍不配合，調查小組得逕行作成調查報告。"},{"id":"50","role":"非主管","category":"職場霸凌","difficulty":"低難度","question":"下列何者「非」雇主防治職場霸凌之必要作為？","options":{"A":"設置申訴管道","B":"辦理教育訓練","C":"定期幫員工安排相親以緩解壓力","D":"訂定防治及懲戒規範"},"answer":"C","explanation":"雇主的責任在於建立安全的物理與社會工作環境，涉及私生活的相親並非職安法規範之防治措施。"},{"id":"51","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"根據《職場霸凌防治指導手冊》，若同仁刻意在工作上隱匿必要資訊，導致特定勞工無法順利達成任務，這屬於霸凌中的哪項樣態？","options":{"A":"社交孤立","B":"工作破壞","C":"權力濫用","D":"名譽侵害"},"answer":"B","explanation":"對特定人破壞或刻意阻礙其工作、利於職務之難、刻意隱匿資訊提供不實資訊，屬於霸凌樣態中的「工作破壞」。"},{"id":"52","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"事業單位僱用勞工人數達多少人以上時，雇主應訂定性騷擾防治措施、申訴及懲戒規範，並在工作場所公開揭示？","options":{"A":"10 人","B":"30 人","C":"50 人","D":"100 人"},"answer":"B","explanation":"根據《性別平等工作法》第 13 條第 1 項，僱用受僱者 30 人以上者，應訂定性騷擾防治措施、申訴及懲戒規範。"},{"id":"53","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"職場霸凌定義中的「情節重大者」，依據 2026 年新修規定，是否必須符合「持續性」發生？","options":{"A":"是，至少要發生三個月","B":"是，至少要發生三次以上","C":"否，情節重大者不以持續發生為必要","D":"由工會與雇主協商認定"},"answer":"C","explanation":"職場霸凌通常指持續性的不當言行，但若情節重大者，不以持續發生為必要。"},{"id":"54","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"受僱者遭受性騷擾後向雇主申訴，雇主應於接獲申訴之日起多久內完成調查結案？","options":{"A":"1 個月","B":"2 個月，必要時得延長 1 個月","C":"3 個月，不得延長","D":"無時效限制"},"answer":"B","explanation":"雇主應於接獲申訴翌日起 2 個月內結案；必要時得延長 1 個月，並通知當事人。"},{"id":"55","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"當非主管同仁發現被申訴人（行為人）為公司的「最高負責人」時，應向何處提起申訴？","options":{"A":"公司人事部門","B":"總經理辦公室","C":"地方主管機關（如勞工局）","D":"行為人的配偶"},"answer":"C","explanation":"被申訴人為最高負責人時，受僱者得逕向地方主管機關提起申訴。"},{"id":"56","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"下列何者「非」職場霸凌定義中的「權力濫用」典型樣態？","options":{"A":"要求過高（刻意分配無法達成之工作）","B":"要求過低（大材小用以羞辱勞工）","C":"正常績效管理下的工作指導","D":"刻意在下班前交付一週才能完成的工作並要求隔早提交"},"answer":"C","explanation":"職場霸凌需「逾越業務上必要且合理範圍」。正常的職務分配或績效管理不屬於霸凌。"},{"id":"57","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"依據《跟蹤騷擾防制法》，跟蹤騷擾行為必須具備下列哪項特質？","options":{"A":"與性或性別有關","B":"發生在公共場所","C":"行為人必須是主管","D":"被害人必須是女性"},"answer":"A","explanation":"跟蹤騷擾行為是指對特定人反覆或持續為違反其意願且「與性或性別有關」之行為。"},{"id":"58","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"雇主在知悉職場霸凌後，採取「隔離措施」時，應遵守下列哪項規定？","options":{"A":"可以直接扣除申訴人的全勤獎金","B":"必須徵得申訴人的意願","C":"應強制申訴人與被申訴人當面對質","D":"應優先將申訴人開除"},"answer":"B","explanation":"雇主採取隔離措施時，應考量申訴人意願，並不得對其薪資等勞動條件作不利變更。"},{"id":"59","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"受僱者遭受性騷擾而向行為人請求損害賠償時，若行為人為「具權勢地位者」，被害人得請求法院酌定損害額幾倍之懲罰性賠償金？","options":{"A":"1 倍","B":"1 倍至 3 倍","C":"3 倍至 5 倍","D":"10 倍"},"answer":"B","explanation":"行為人為具權勢地位者，被害人得請求 1 倍至 3 倍之懲罰性賠償金；行為人為最高負責人時方得請求 3 至 5 倍。"},{"id":"60","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"職場霸凌調查過程中，訪談紀錄的正確處理方式為何？","options":{"A":"應公開貼在布告欄以示公正","B":"應以秘密方式為之，並保護當事人隱私","C":"必須讓申訴人與被申訴人當面對質後才可記錄","D":"調查人員可以隨意對外分享訪談內容"},"answer":"B","explanation":"處理性騷擾或霸凌案件時，應保護當事人隱私，對其姓名或足以辨識身分之資料予以保密。"},{"id":"61","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"僱用人數達多少人之雇主，應設置處理職場霸凌申訴之專線電話或電子信箱？","options":{"A":"5 人以上","B":"10 人以上","C":"30 人以上","D":"100 人以上"},"answer":"B","explanation":"僱用勞工人數在 10 人以上之雇主，應設置處理職場霸凌申訴之管道並公開揭示。"},{"id":"62","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"受僱者對於公司之職場霸凌申訴決定不服，應於收到通知翌日起幾日內提出「申復」？","options":{"A":"10 日","B":"15 日","C":"30 日","D":"60 日"},"answer":"C","explanation":"當事人不服申訴決定，得於收到書面通知翌日起 30 日內提出申復。"},{"id":"63","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"性騷擾申訴人於何時得以書面「撤回」申訴？","options":{"A":"調查開始前","B":"決議通知書送達前","C":"行政訴訟結束後","D":"隨時皆可撤回且不限次數"},"answer":"B","explanation":"申訴人得於決議通知書送達前撤回申訴。"},{"id":"64","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"下列何者屬於霸凌樣態中的「社交孤立」？","options":{"A":"主管要求員工在指定位置辦公","B":"故意不讓勞工參加必要的重要會議或事務活動","C":"雇主基於業務需要將員工調至其他分公司","D":"同事之間單純的溝通不合"},"answer":"B","explanation":"社交孤立包含對特定人刻意掛鉤、忽視、冷落，或不讓其參與必要之重要會議或事務活動。"},{"id":"65","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"受僱者遭受性騷擾致生法律訴訟，受司法機關通知到庭參與程序，雇主「應」給予何種假別？","options":{"A":"事假","B":"公假","C":"病假","D":"特別休假"},"answer":"B","explanation":"根據《性別平等工作法》第 27 條第 4 項，被害人到庭參與程序期間，雇主應給予公假。"},{"id":"66","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"職場霸凌調查報告之內容「不應」包含下列哪一項？","options":{"A":"訪談過程紀錄","B":"事實認定及理由","C":"行為人的配偶薪資單","D":"處理建議"},"answer":"C","explanation":"調查報告應包含案由、訪談紀錄、事實認定及處理建議。與案情無關之私人財務資訊不應包含在內。"},{"id":"67","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"依據《職場霸凌防治措施準則》，雇主應於受理申訴翌日起幾日內登錄主管機關指定之系統？","options":{"A":"3 個工作日","B":"7 個工作日","C":"10 個工作日","D":"15 個工作日"},"answer":"B","explanation":"雇主應於受理翌日起 7 個工作日內，依中央主管機關公告方式登錄系統。"},{"id":"68","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"若申訴案件涉及「權勢性騷擾」，申訴期限為何？","options":{"A":"行為終了起 1 年內","B":"知悉起 2 年，發生起 5 年","C":"知悉起 3 年，發生起 7 年","D":"無時效限制"},"answer":"C","explanation":"屬權勢性騷擾事件者，申訴期限為知悉起 3 年，但自發生時起逾 7 年者不得提出。"},{"id":"69","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"雇主對於職場霸凌防治之「執行紀錄」（包含預防、申訴、調查、申復等處理過程）應保存多久？","options":{"A":"1 年","B":"3 年","C":"5 年","D":"永久保存"},"answer":"B","explanation":"雇主應將處理過程及結果作成執行紀錄，並留存 3 年。"},{"id":"70","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"性騷擾申復審議會議進行時，下列敘述何者正確？","options":{"A":"為了保密，申復人絕對不得出席","B":"應給予申復人陳述意見之機會","C":"僅能邀請最高負責人列席","D":"申復決定必須在一週內作成"},"answer":"B","explanation":"申復審議會議進行時，應給予申復人陳述意見之機會。"},{"id":"71","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"若勞工因性騷擾申訴應被雇主「調職」或「減薪」，此舉違反了哪項原則？","options":{"A":"契約自由原則","B":"報復禁止原則","C":"比例原則","D":"誠實信用原則"},"answer":"B","explanation":"雇主不得對提起申訴或協助申訴之勞工予以解僱、調職或其他不利之處分。"},{"id":"72","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"一般職場霸凌申訴（非最高負責人為行為人），其提起申訴的期限為何？","options":{"A":"行為終了起 1 年內","B":"行為終了起 3 年內","C":"離職之日起 10 年內","D":"無期限限制"},"answer":"B","explanation":"一般職場霸凌申訴期限為自行為終了時起，逾 3 年者不予受理。"},{"id":"73","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"事業單位僱用受僱者達幾人以上，申訴處理單位應有具備性別意識之專業人士參與？","options":{"A":"5 人","B":"10 人","C":"30 人","D":"100 人"},"answer":"C","explanation":"僱用受僱者 30 人以上之雇主，申訴處理單位中應有具備性別意識之專業人士。"},{"id":"74","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"非主管同仁在「出差途中」遭受同事性騷擾，是否適用《性別平等工作法》？","options":{"A":"不適用，因為不在辦公室","B":"適用，因為發生在執行職務之工作場所","C":"僅適用於發生在公司大樓內","D":"由出差地點之警察機關決定"},"answer":"B","explanation":"工作場所指受僱者執行職務時所在之處，出差執行職務期間仍屬法規適用範圍。"},{"id":"75","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"職場霸凌調查報告中的「處理建議」，內容應涵蓋下列何者？","options":{"A":"僅需載明行為人姓名","B":"預防措施、懲戒建議或處理建議","C":"申訴人的家庭背景","D":"建議申訴人私下和解金額"},"answer":"B","explanation":"調查報告之處理建議應包含懲處建議及預防措施。"},{"id":"76","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"若申訴書格式不合法但可以補正，雇主應通知申訴人於幾日內補正？","options":{"A":"3 日","B":"7 日","C":"14 日","D":"30 日"},"answer":"C","explanation":"申訴書不合法定程式但可補正者，雇主應通知其於 14 日內補正。"},{"id":"77","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"職場霸凌「協調」程序中，若協調「不成立」時，雇主應如何處置？","options":{"A":"視同結案，不予理會","B":"續行調查程序","C":"強制行為人道歉","D":"扣除雙方薪資作為行政規費"},"answer":"B","explanation":"協調不成立或逾一個月未達成共識者，雇主應續行調查並採取糾正補救措施。"},{"id":"78","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"受僱者遭受性騷擾後若有「法律諮詢」需求，可向下列哪個機構尋求協助？","options":{"A":"內政部移民署","B":"財政部國稅局","C":"法律扶助基金會","D":"環境保護局"},"answer":"C","explanation":"法律扶助基金會提供民、刑法等相關法律諮詢資源。"},{"id":"79","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"職場霸凌中「要求過低」的樣態，常見於何種情況？","options":{"A":"讓新進同仁慢慢熟悉業務","B":"為了羞辱高階工程師，故意命其處理訂便當、影印等助理工作","C":"勞工因傷調整較輕便之工作","D":"提早讓績優勞工下班"},"answer":"B","explanation":"要求過低指雇主基於逼退或羞辱意圖之「大材小用」，例如命高階勞工處理低階庶務。"},{"id":"80","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"性騷擾申訴案件受理後，若發現「應迴避而未迴避」之情形，受僱者應向誰申請令其迴避？","options":{"A":"行為人本人","B":"雇主","C":"當地警察局長","D":"機關首長之秘書"},"answer":"B","explanation":"申訴人或被申訴人發現有偏頗之虞時，得以書面向「雇主」申請令調查人員迴避。"},{"id":"81","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"受僱者若在參加「員工協助方案」(EAPs) 諮商時被霸凌，雇主是否負有防治責任？","options":{"A":"否，諮商屬私人活動","B":"是，凡執行職務或與職場相關之場合均在防治範圍內","C":"由諮商師個人負責","D":"視諮商地點是否在公司大樓內而定"},"answer":"B","explanation":"職場霸凌包含執行職務過程中發生之不當言行。員工協助方案亦屬雇主提供之職場支持體系，雇主仍應維護其友善環境。"},{"id":"82","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"性騷擾防治中，所謂「交換式性騷擾」是指？","options":{"A":"兩名同事互換辦公室位置","B":"行為人以提供加薪、考績作為受僱者服從性要求之交換條件","C":"行為人在茶水間講黃色笑話","D":"以上皆非"},"answer":"B","explanation":"交換式性騷擾指以性要求作為勞務契約成立、存續或職務利益之交換條件。"},{"id":"83","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"雇主知悉性騷擾發生時，申訴人若已「離職」，雇主依法應如何處理？","options":{"A":"因為已離職，雇主無須履行任何防治義務","B":"依然要採取立即有效之糾正及補救措施","C":"僅需向申訴人發送祝賀離職卡","D":"停止所有勞保給付"},"answer":"B","explanation":"雇主知悉性騷擾發生時，不因申訴人或被申訴人離職而免除義務。"},{"id":"84","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"職場霸凌之調查訪談「不得」令當事人間進行下列何項動作？","options":{"A":"各自提供書面證據","B":"申請律師陪同","C":"當面對質","D":"閱覽訪談要旨"},"answer":"C","explanation":"調查過程中應保護當事人隱私，且不得令當事人間或協助調查之相關人對質。"},{"id":"85","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"性別平等工作法規定的「最高負責人」不包含下列何者？","options":{"A":"學校校長","B":"公司董事長","C":"一般資深員工","D":"機關首長"},"answer":"C","explanation":"最高負責人指機關首長、校長、董事長或對外代表人。一般同仁不具此身分。"},{"id":"86","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"若勞工遭受客戶（不特定人）性騷擾，雇主在第一時間的協助措施應包含？","options":{"A":"要求勞工自行報案","B":"協助保全監視器畫面或對話紀錄等證據","C":"直接開除該客戶","D":"扣除該勞工當日薪資"},"answer":"B","explanation":"雇主應協助被害人申訴及保全相關證據，如監視器畫面等。"},{"id":"87","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"職場霸凌調查報告完成後，應送交哪個單位審議其「申訴成立與否」？","options":{"A":"申訴處理單位","B":"被申訴人之直屬主管","C":"地方政府稅務局","D":"外部營利顧問公司"},"answer":"A","explanation":"調查小組調查之結果，應移送「申訴處理單位」進行後續審議及作成決定。"},{"id":"88","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"僱用人數達多少人以上之雇主，依法應對主管定期舉辦防治性騷擾之進階教育訓練？","options":{"A":"5 人以上","B":"10 人以上","C":"30 人以上","D":"500 人以上"},"answer":"C","explanation":"僱用受僱者 30 人以上之雇主，應針對主管及申訴處理人員定期舉辦教育訓練。"},{"id":"89","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"職場霸凌事件中，被申訴人若為主管且「情節重大」，雇主在調查期間得採取的先行措施為何？","options":{"A":"沒收其所有個人財產","B":"暫時停止或調整其職務","C":"公開其全家個資","D":"強制其與申訴人互換座位"},"answer":"B","explanation":"被申訴人具權勢地位且情節重大時，雇主得先行停止或調整被申訴人職務。"},{"id":"90","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"受僱者遭受性騷擾請求損害賠償時，雇主之責任為何？","options":{"A":"雇主絕對不負責任","B":"雇主僅負責提供心理諮商","C":"雇主應與行為人連帶負損害賠償責任（除非證明已盡力防止）","D":"雇主應代替行為人去坐牢"},"answer":"C","explanation":"根據《性別平等工作法》第 27 條，雇主與行為人連帶負損害賠償責任。"},{"id":"91","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"關於職場霸凌定義中之「冷落或孤立」，必須達到何種程度方較可能認定成立？","options":{"A":"偶爾一次沒打招呼","B":"主管因忙碌未回信","C":"持續性且逾越業務必要範圍之排擠或社交隔絕","D":"勞工自己不想跟同事說話"},"answer":"C","explanation":"職場霸凌需具備「逾越業務合理範圍」及「持續性」等要件。"},{"id":"92","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"若性騷擾申訴案件之調查發現調查小組「未符合性別比例」規定，應如何救濟？","options":{"A":"向中央主管機關（勞動部）提出申復","B":"向公司提出申復，且應重組成申復調查小組","C":"由調查小組自行更改性別即可","D":"案件自動失效不予處理"},"answer":"B","explanation":"組成不合法屬於調查程序重大瑕疵，當事人提出申復後應重組小組再行調查。"},{"id":"93","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"非主管同仁若對同事進行「不適當之凝視」或「嗅聞」，在性騷法規中屬於何種行為？","options":{"A":"交換式性騷擾","B":"正常之同僚友誼","C":"肢體性騷擾（廣義樣態）","D":"霸凌中之名譽侵害"},"answer":"C","explanation":"不適當之凝視、嗅聞、觸摸他人身體，均屬性騷擾之判斷樣態。"},{"id":"94","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"申復期間若發現「足以影響原調查認定之新事證」，申復決定期限得如何延長？","options":{"A":"展延 10 日","B":"展延 30 日","C":"展延至一年為止","D":"不得展延"},"answer":"B","explanation":"申復案件如屬應再行調查者，其決定期限得展延 30 日。"},{"id":"95","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"若員工「惡意虛構事實」提起職場霸凌申訴，經調查證實後，雇主應？","options":{"A":"予以表揚其舉報精神","B":"為適當之懲戒或處理","C":"對被誣陷者進行減薪","D":"將全案密封後永久封存"},"answer":"B","explanation":"經證實有惡意虛構事實者，雇主應對申訴人為適當之懲戒。"},{"id":"96","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"職場霸凌防治中，「名譽侵害」不包含下列哪項行為？","options":{"A":"散布關於同僚之不實負面訊息","B":"在大群組揭露同事之隱私","C":"主管在績效評談時針對工作表現進行討論","D":"惡意抹黑同仁之職場評價"},"answer":"C","explanation":"基於業務必要之績效討論，不屬於刻意侵害名譽之霸凌行為。"},{"id":"97","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"大型雇主（僱用 500 人以上）應視受僱者需求，提供至少幾次心理諮商協助？","options":{"A":"1 次","B":"2 次","C":"5 次","D":"10 次"},"answer":"B","explanation":"大型雇主應視請求提供至少 2 次心理諮商協助。"},{"id":"98","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"下列何者非「防治職場霸凌教育訓練」的建議初階內容？","options":{"A":"認識霸凌定義與樣態","B":"申訴管道介紹","C":"如何避開法律責任的漏洞","D":"壓力紓解與溝通技巧"},"answer":"C","explanation":"教育訓練旨在預防霸凌並提升防治知能，而非逃避責任。"},{"id":"99","role":"非主管","category":"性騷擾防治","difficulty":"中難度","question":"受僱者若遭受性騷擾而提起法律訴訟，雇主拒絕給予公假者，依法最高可罰多少元？","options":{"A":"10 萬元","B":"30 萬元","C":"50 萬元","D":"100 萬元"},"answer":"B","explanation":"違反公假給予義務者，處新臺幣 2 萬元以上 30 萬元以下罰鍰。"},{"id":"100","role":"非主管","category":"職場霸凌","difficulty":"中難度","question":"職場霸凌防治專章定自何時施行？","options":{"A":"113 年 1 月 1 日","B":"114 年 12 月 19 日","C":"115 年 7 月 1 日","D":"116 年 3 月 8 日"},"answer":"C","explanation":"根據新修職安法規定，職場霸凌防治專案定自 115 年 7 月 1 日施行。"},{"id":"101","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"根據《職場霸凌防治指導手冊》，若主管明知某非主管員工不具備特定語言能力，卻刻意分派其在極短時間內處理該語言之專業合約，此種行為在霸凌樣態中被歸類為何？","options":{"A":"社交孤立","B":"工作破壞","C":"權力濫用中的「要求過高」","D":"名譽侵害"},"answer":"C","explanation":"根據手冊，刻意向特定勞工分配其能力上明顯無法達成之工作，屬於權力濫用樣態中的「要求過高」。"},{"id":"102","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"當受僱者遭受「最高負責人」性騷擾時，若欲向地方主管機關提起申訴，其法定的申訴期限為何？","options":{"A":"知悉起 2 年，行為終了起 5 年","B":"至遲得於離職之日起 1 年內提起，但行為終了已逾 10 年者不予受理","C":"發生之日起 30 日內","D":"無申訴期限限制"},"answer":"B","explanation":"行為人為最高負責人時，受僱者得於離職之日起 1 年內提起申訴；但須注意若行為終了已逾 10 年，因裁處權時效消滅將不予受理。"},{"id":"103","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"雇主非因接獲申訴而知悉職場霸凌情形時（例如經由媒體報導得知），依規定仍應採取立即有效之措施。下列何者「並非」法規要求的必要作為？","options":{"A":"訪談相關人員，就相關事實進行必要之釐清及查證","B":"告知被害勞工得主張之權益，並依其意願協助其協調或提起申訴","C":"強制被害勞工必須在 7 日內完成正式書面申訴","D":"對相關人員適度調整工作內容或工作場所"},"answer":"C","explanation":"雇主知悉後應主動釐清事實並告知權益，但不應強制被害人申訴，需尊重其意願。"},{"id":"104","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"針對僱用勞工人數在 100 人以上之事業單位，其「職場霸凌調查小組」成員中，外部專業人士的比例不得少於多少？","options":{"A":"三分之一","B":"二分之一","C":"三分之二","D":"必須全數由外部專家組成"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》，100 人以上之企業，調查小組之外部專業人士比例不得少於二分之一。"},{"id":"105","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"性騷擾事件調查程序應自受理申訴翌日起多久內完成結案？","options":{"A":"1 個月內，不得延長","B":"2 個月內，必要時得延長 1 個月並通知當事人","C":"3 個月內，不得延長","D":"無時效限制"},"answer":"B","explanation":"性騷擾申訴案件應於 2 個月內結案，必要時得延長 1 個月，且應通知當事人。"},{"id":"106","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"在職場性騷擾認定中，所謂「合理被害人標準」主要考量下列何種因素？","options":{"A":"僅考量申訴人個人的主觀感受","B":"考量一般人處於相同之背景、關係及環境下，是否會有相同的受侵犯感受","C":"考量行為人主觀上是否有性騷擾意圖","D":"以公司最高負責人的道德標準為準"},"answer":"B","explanation":"認定標準並非全然憑主觀感受，而是參考一般人在相同環境下是否感到被冒犯。"},{"id":"107","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"若受僱者對於職場霸凌申訴成立與否之決定不服，應於收到書面通知翌日起幾日內提出「申復」？","options":{"A":"10 日內","B":"15 日內","C":"30 日內","D":"60 日內"},"answer":"C","explanation":"當事人不服決定時，得於 30 日內以書面具明理由向雇主提出申復。"},{"id":"108","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"非主管同仁 A 是派遣勞工，在要派單位 B 公司工作時遭 B 公司員工性騷擾。關於調查義務，下列敘述何者正確？","options":{"A":"只有派遣公司負調查責任","B":"只有要派單位負調查責任","C":"派遣公司與要派單位應共同調查，並將結果通知雙方及當事人","D":"實務上應由警察機關主導，雇主無須介入"},"answer":"C","explanation":"派遣勞工受騷擾時，派遣公司與要派單位均為雇主，應共同履行糾正及補救措施。"},{"id":"109","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"雇主在調查性騷擾期間，採取的「隔離措施」應遵循哪項重要原則？","options":{"A":"被害人如果不配合，可以直接扣薪","B":"應徵得被害人同意，且不得對其薪資等勞動條件作不利之變更","C":"必須同時將申訴人與被申訴人一起停職","D":"隔離措施僅能由工會決定"},"answer":"B","explanation":"隔離措施（如調動座位、居家辦公）需考量申訴人意願，且嚴禁對申訴人之勞動條件作不利變更。"},{"id":"110","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"若經調查證實，申訴人是基於惡意而「虛構事實」提起霸凌申訴，雇主依法應如何處理？","options":{"A":"這是勞工言論自由，不予理會","B":"應對該申訴人為適當之懲戒或處理","C":"依然要懲罰被誣陷的同事以示公平","D":"雇主只能私下勸告，不可紀錄"},"answer":"B","explanation":"根據準則，經證實有惡意虛構事實者，雇主應對其進行懲戒，以建立健康職場。"},{"id":"111","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"一般職場霸凌案件（非最高負責人為行為人時），勞工向雇主提起申訴的期限為何？","options":{"A":"行為發生起 1 年內","B":"自職場霸凌行為終了時起，逾 3 年者不予受理","C":"離職後 10 年內","D":"無時效限制"},"answer":"B","explanation":"一般霸凌申訴期限為行為終了起算 3 年。"},{"id":"112","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"關於《跟蹤騷擾防制法》的處罰，行為人若「攜帶凶器」對同仁進行與性或性別有關之跟蹤騷擾，其最高刑責為何？","options":{"A":"處 1 年以下有期徒刑","B":"處 3 年以下有期徒刑","C":"處 5 年以下有期徒刑或併科新臺幣 50 萬元以下罰金","D":"處以行政罰鍰 100 萬元"},"answer":"C","explanation":"攜帶凶器犯跟蹤騷擾罪者，加重處罰，處 5 年以下有期徒刑或併科 50 萬元以下罰金。"},{"id":"113","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"雇主或參與性騷擾調查人員，若違反保密義務揭露被害人隱私資料，依法應負負擔何種責任？","options":{"A":"僅負擔道德譴責","B":"行政處分、民事賠償，若涉刑事則依相關法規辦理","C":"只要是為了公眾利益，無須負責","D":"僅需向被害人口頭道歉"},"answer":"B","explanation":"參與調查人員負有嚴格保密義務，違者應負法律責任。"},{"id":"114","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"在職場霸凌的「申復調查小組」中，若企業規模達 100 人以上，外部專業人士之比例規定為何？","options":{"A":"不得少於三分之一","B":"不得少於二分之一","C":"不得少於三分之二","D":"必須全數為外部專家"},"answer":"C","explanation":"針對 100 人以上企業，申復調查小組之外部專業人士比例「不得少於三分之二」。"},{"id":"115","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"受僱者參加雇主舉辦之「尾牙或春酒」活動時，若遭受同事性騷擾，應適用哪部法規處理？","options":{"A":"性騷擾防治法（非工作時間）","B":"性別平等工作法（延伸適用）","C":"社會秩序維護法","D":"職業安全衛生法（僅限物理安全）"},"answer":"B","explanation":"尾牙或春酒屬雇主舉辦之活動，員工間發生性騷擾仍屬《性別平等工作法》之適用範圍。"},{"id":"116","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"在性騷擾防治法規中，「交換式性騷擾」的主要特徵是什麼？","options":{"A":"行為人單方面對被害人進行不當肢體碰觸","B":"以被害人接受或拒絕行為人之性要求，作為獲得或喪失工作權益之條件","C":"行為人在辦公室張貼色情圖片","D":"以上皆是"},"answer":"B","explanation":"交換式性騷擾明確涉及職務利益（如考績、陞遷）的交換。"},{"id":"117","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"雇主對於職場霸凌防治之「執行紀錄」（如調查報告、決定書），應保存多久？","options":{"A":"1 年","B":"3 年","C":"5 年","D":"永久保存"},"answer":"B","explanation":"相關處理過程及結果紀錄應作成執行紀錄並留存 3 年。"},{"id":"118","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"主管機關對於違反《性別平等工作法》防治義務（知悉而未處理）的雇主，除處以罰鍰外，還「應」採取何種行動？","options":{"A":"沒收公司財產","B":"公布雇主名稱、負責人姓名及處分資訊","C":"勒令公司立即停業","D":"強制雇主全額支付被害人所有生活開銷"},"answer":"B","explanation":"違反性工法第 13 條等規定者，主管機關應公布其名稱及負責人姓名。"},{"id":"119","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"「最高負責人」在《性別平等工作法》中的定義，下列何者「不屬於」此範疇？","options":{"A":"公司董事長","B":"機關首長","C":"部門經理（非對外代表人）","D":"公營事業機構理事主席"},"answer":"C","explanation":"最高負責人指對外代表機關或公司之人；一般部門主管雖有指揮權，但非法律定義之最高負責人。"},{"id":"120","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"當霸凌事件涉及不同事業單位勞工時（具業務往來關係），關於通知義務之敘述何者正確？","options":{"A":"接獲申訴之雇主應以密件通知他方雇主，共同協商解決或補救辦法","B":"為了保護隱私，嚴禁通知他方雇主","C":"只有被害人可以通知他方雇主","D":"接獲申訴之雇主應立即向媒體揭露他方公司名稱"},"answer":"A","explanation":"具共同作業或業務往來關係者，知悉後應書面通知他方共同協商補救辦法。"},{"id":"121","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"主管因逼退勞工意圖，故意不讓高階勞工處理專業工作，反而命其處理「訂便當、影印」等庶務，這在霸凌樣態中屬於？","options":{"A":"要求過高","B":"要求過低","C":"正常職務輪調","D":"社交孤立"},"answer":"B","explanation":"雇主基於羞辱意圖之「大材小用」，屬於權力濫用中的「要求過低」樣態。"},{"id":"122","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"職場霸凌調查訪談過程中，關於「錄音或錄影」之規定，下列何者正確？","options":{"A":"受訪者可以隨意自行錄音","B":"調查小組應以錄音或錄影輔助並作成紀錄，但受訪者不得自行錄音","C":"嚴禁任何形式之電子記錄，僅能靠紙筆","D":"必須經行為人同意後方可錄音"},"answer":"B","explanation":"為確保調查保密與專業，調查小組應錄音錄影，但受訪人員通常不得自行錄製。"},{"id":"123","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"事業單位僱用受僱者達 500 人以上者，雇主對於有需求之性騷擾申訴人應提供多少次心理諮商協助？","options":{"A":"1 次","B":"2 次","C":"5 次","D":"由員工自理，雇主無須提供"},"answer":"B","explanation":"根據指導手冊，大型雇主應視請求提供至少 2 次心理諮商協助。"},{"id":"124","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"受僱者遭受性騷擾請求損害賠償時，若行為人為「具權勢地位者」，法院最高得酌定損害額幾倍之懲罰性賠償金？","options":{"A":"1 倍","B":"3 倍","C":"5 倍","D":"10 倍"},"answer":"B","explanation":"被害人得請求損害額 1 倍至 3 倍之懲罰性賠償金；行為人為最高負責人時方得請求 3 至 5 倍。"},{"id":"125","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"若主管機關認定雇主之職場霸凌調查程序有「重大瑕疵」，得採取何種行動？","options":{"A":"直接判處行為人入獄","B":"要求雇主重新調查，雇主不得拒絕","C":"立即關閉該事業單位","D":"沒收所有調查紀錄"},"answer":"B","explanation":"經認定調查程序有重大瑕疵者，主管機關得要求雇主重新調查，雇主不得拒絕。"},{"id":"126","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"關於跟蹤騷擾保護令之效期，每次核發最長為幾年？","options":{"A":"1 年","B":"2 年","C":"3 年","D":"永久"},"answer":"B","explanation":"根據《跟蹤騷擾防制法》，保護令效期最長為 2 年，失效前得聲請延長。"},{"id":"127","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"在同事之間散布關於特定勞工之「不實負面訊息」或揭露隱私，這符合霸凌中的哪項樣態？","options":{"A":"權力濫用","B":"名譽侵害","C":"工作破壞","D":"社交孤立"},"answer":"B","explanation":"刻意散布謠言或揭露隱私以破壞其職場地位，符合名譽侵害之樣態。"},{"id":"128","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"受僱者遭受「非最高負責人」之人性騷擾時，向地方主管機關提起申訴之期限為何？","options":{"A":"發生起 10 年內","B":"知悉起 2 年內，但自發生時起逾 5 年者不予受理","C":"行為終了起 1 年內","D":"無時效限制"},"answer":"B","explanation":"根據《性別平等工作法》，一般性騷擾申訴時效為知悉起 2 年，發生起 5 年。"},{"id":"129","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"機關於所屬公共場所發生性騷擾事件時，應採取的補救措施不包括下列何者？","options":{"A":"協助被害人申訴及保全相關證據","B":"必要時協助通知警察機關","C":"要求被害人簽署放棄追訴切結書","D":"檢討所屬場所安全"},"answer":"C","explanation":"機關應提供協助與加強安全，絕非要求被害人放棄權利。"},{"id":"130","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"僱用受僱者 30 人以上之雇主，依法應對哪些對象「優先」實施性騷擾防治教育訓練？","options":{"A":"剛畢業的新進員工","B":"離職員工","C":"擔任主管職務者及參與申訴調查的人員","D":"所有的基層體力勞動者"},"answer":"C","explanation":"主管及申訴處理人員應優先接受進階訓練，以確保處理流程之專業性。"},{"id":"131","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"性騷擾申訴人於何時點前得以書面「撤回」申訴？","options":{"A":"調查啟動前","B":"調查小組組成前","C":"決議通知書送達前","D":"隨時皆可撤回且不限次數"},"answer":"C","explanation":"申訴人得於決議通知書送達前撤回申訴，但撤回後除非有新證據，否則不得再申訴。"},{"id":"132","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"職場霸凌調查報告之內容，法規規定應包含下列哪些項目？","options":{"A":"申訴要旨、訪談紀錄摘要、事實認定與理由、處理建議","B":"僅需載明被申訴人之身分證字號","C":"僅需載明成立或不成立","D":"當事人之歷年薪資條"},"answer":"A","explanation":"調查報告應具備完整的事實描述、認定理由及後續處理建議。"},{"id":"133","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"雇主因勞工提出職場霸凌申訴而對其給予「降調」或「減薪」，此舉違反了哪項法律原則？","options":{"A":"誠實信用原則","B":"報復禁止原則（不當差別待遇禁止）","C":"比例原則","D":"勞務提供原則"},"answer":"B","explanation":"雇主不得因勞工申訴而給予解僱、降調、減薪等不利處分。"},{"id":"134","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"調查人員若與當事人具有「四親等內血親」關係時，應如何處理？","options":{"A":"只要自己覺得能公正，無須處理","B":"應自行迴避，雇主亦應主動命其迴避","C":"僅能擔任紀錄人員","D":"只要申訴人同意就不用迴避"},"answer":"B","explanation":"具親屬關係者符合利益衝突，依法應強制迴避。"},{"id":"135","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"僱用人數在 30 人以上未達 100 人之雇主，其職場霸凌申訴案件應於多久內作成決定？","options":{"A":"接獲申訴翌日起 2 個月內","B":"接獲申訴翌日起 3 個月內","C":"接獲申訴翌日起 4 個月內","D":"接獲申訴翌日起 6 個月內"},"answer":"C","explanation":"不同規模之企業有不同時限，30-100 人企業為 4 個月；100 人以上及未滿 30 人者則為 3 個月。"},{"id":"136","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"受僱者於「非工作時間」遭受「同一事業單位」之人持續性騷擾，是否適用《性別平等工作法》？","options":{"A":"不適用，應適用刑法","B":"依然適用，因為具備持續性且影響工作表現","C":"僅適用於在公司內部發生的行為","D":"由雇主決定是否適用"},"answer":"B","explanation":"持續性騷擾即便延伸至非工作時間，若影響工作尊嚴，仍適用性工法。"},{"id":"137","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"派遣勞工遭受要派單位人員性騷擾時，誰負有登錄主管機關系統之義務？","options":{"A":"僅派遣公司","B":"僅要派單位","C":"由派遣公司與要派單位共同協商後由一方或雙方執行","D":"勞保局"},"answer":"C","explanation":"派遣案件之雇主義務具備重疊性，需共同協商補救辦法及執行登錄。"},{"id":"138","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"辦理防治職場霸凌教育訓練時，所謂「旁觀者介入」課程之目的為何？","options":{"A":"訓練勞工如何躲避責任","B":"訓練目睹者具備行動力協助受害者，營造友善環境","C":"鼓勵大家去監視同事隱私","D":"訓練律師辯論技巧"},"answer":"B","explanation":"旁觀者教育旨在建立集體支持系統，防止霸凌行為惡化。"},{"id":"139","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"受僱者若因性騷擾而提起法律訴訟，雇主應給予公假。若雇主違反此規定，罰鍰金額為何？","options":{"A":"1 萬元至 5 萬元","B":"2 萬元至 30 萬元","C":"10 萬元至 100 萬元","D":"處以死刑"},"answer":"B","explanation":"違反公假給予義務者，處新臺幣 2 萬元以上 30 萬元以下罰鍰。"},{"id":"140","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"性別平等工作法中，若行為人為最高負責人，其行政罰鍰最高限額為何？","options":{"A":"10 萬元","B":"50 萬元","C":"100 萬元","D":"無上限"},"answer":"C","explanation":"最高負責人經地方主管機關認定有性騷擾者，處 1 萬元以上 100 萬元以下罰鍰。"},{"id":"141","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"100 人以上企業之「職場霸凌調查報告」完成後，應送交哪個單位審議？","options":{"A":"勞工法院","B":"申訴處理單位","C":"全體勞工大會","D":"行為人之直屬主管"},"answer":"B","explanation":"調查小組調查完成後應送交「申訴處理單位」作成成立與否之決定。"},{"id":"142","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"下列何者屬於霸凌樣態中的「社交孤立」？","options":{"A":"讓員工回家休息","B":"故意不讓勞工參加必要的重要會議或事務活動","C":"主管因業績差而公開點名批評","D":"正常的輪班異動"},"answer":"B","explanation":"社交孤立的核心在於「排除互動」與「冷落」。"},{"id":"143","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"不服地方主管機關（政府）所為之行政處分時，應於 10 日內向中央主管機關申請？","options":{"A":"申復","B":"審議","C":"行政訴訟","D":"調解"},"answer":"B","explanation":"針對地方機關處分不服，可向中央主管機關（如勞動部性平會）申請審議。"},{"id":"144","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"受僱者遭受性騷擾後申請「法律扶助」，補助範圍不包括下列何者？","options":{"A":"律師酬金","B":"裁判費","C":"行為人的安撫金","D":"保全程序之律師費"},"answer":"C","explanation":"扶助範圍包含訴訟相關費用，不包含給予行為人之補償。"},{"id":"145","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"勞工遭受最高負責人性騷擾，除內部管道外，得逕向哪一級機關提起申訴？","options":{"A":"總統府","B":"直轄市或縣（市）主管機關","C":"法務部調查局","D":"世界貿易組織"},"answer":"B","explanation":"權勢及負責人案件，可逕向地方主管機關提起申訴。"},{"id":"146","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"申復會議若發現原調查有「應迴避而未迴避」之重大瑕疵，應如何處理？","options":{"A":"忽略不計，維持原判","B":"應組成「申復調查小組」再行調查","C":"撤回案件並永不受理","D":"要求被害人簽署保密切結書"},"answer":"B","explanation":"重大瑕疵案件應重啟調查，並由具備更高比例外部專家之小組執行。"},{"id":"147","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"一般跟蹤騷擾罪（非攜帶兇器者）之罰金限額為何？","options":{"A":"1 萬元","B":"10 萬元","C":"50 萬元","D":"100 萬元"},"answer":"B","explanation":"一般跟蹤騷擾行為者，處 1 年以下有期徒刑、拘役或科或併科 10 萬元以下罰金。"},{"id":"148","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"若勞工在外工作（如房仲、記者）遭受性騷擾，雇主在預防措施上應？","options":{"A":"因為不在辦公室，雇主免除所有責任","B":"進行風險辨識、提供防護措施並事前告知","C":"要求勞工必須自行攜帶防身配備","D":"停止所有外派業務"},"answer":"B","explanation":"雇主對在外工作者仍負有工作環境性騷擾風險辨識與告知義務。"},{"id":"149","role":"非主管","category":"職場霸凌","difficulty":"中高難度","question":"勞工向政府檢舉雇主霸凌調查程序違法，經認定屬實後，主管機關得命令雇主？","options":{"A":"重新調查，且雇主不得拒絕","B":"立即開除所有相關主管","C":"賠償政府 1000 萬元","D":"強制勞工放假一年"},"answer":"A","explanation":"經主管機關認定程序有重大瑕疵，雇主必須重新調查。"},{"id":"150","role":"非主管","category":"性騷擾防治","difficulty":"中高難度","question":"根據新修法規，僱用勞工人數達幾人以上之事業單位，應設置「具備性別意識之專業人士」參與申訴處理單位？","options":{"A":"10 人","B":"30 人","C":"100 人","D":"500 人"},"answer":"B","explanation":"根據《工作場所性騷擾防治措施準則》第 12 條，僱用受僱者 30 人以上之雇主，申訴處理單位應有具備性別意識之專業人士。"},{"id":"151","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"某受僱者在執行職務時，遭受具權勢地位之主管性騷擾，且該行為同時符合「交換式」與「敵意式」性騷擾樣態。若該受僱者欲請求「懲罰性賠償金」，依《性別平等工作法》之規定，法院最高得酌定損害額幾倍之賠償金？","options":{"A":"損害額 1 倍至 3 倍","B":"損害額 3 倍至 5 倍","C":"損害額 5 倍至 10 倍","D":"性工法僅規範行政罰鍰，無懲罰性賠償金之規定"},"answer":"A","explanation":"根據《性別平等工作法》第 27 條，行為人為「具權勢地位」者，被害人得請求損害額 1 倍至 3 倍之懲罰性賠償金；若行為人為「最高負責人」時，才得請求 3 倍至 5 倍。"},{"id":"152","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"依據 2026 年施行之《職場霸凌防治措施準則》，若非主管人員遭受職場霸凌並提起申訴，被申訴人屬「利用權勢」者，其申訴期限之起算與限制為何？","options":{"A":"知悉起 2 年，行為終了起 5 年","B":"自職場霸凌行為終了時起，逾 3 年者不予受理","C":"得於離職之日起 1 年內申訴，但若行為終了起已逾 3 年，仍從較長之規定","D":"行為發生起 10 年內皆可申訴"},"answer":"C","explanation":"根據《職場霸凌防治措施準則》第 8 條，一般申訴期限為行為終了起 3 年。若被申訴人屬利用權勢者，勞工得於離職之日起 1 年內提出，但若「行為終了起 3 年」的期限較長，則從其規定。"},{"id":"153","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"受僱者遭受性騷擾後向雇主申訴，雇主在調查過程中，下列哪項做法「違反」了現行法規之程序正義或隱私保護原則？","options":{"A":"調查小組成員若為行為人之配偶應主動迴避","B":"為了釐清真相，調查小組安排申訴人與被申訴人當面對質與辯論","C":"被申訴人若無正當理由拒絕配合訪談，調查小組得逕行作成調查報告","D":"調查報告應載明事實認定及理由，並提供處理建議"},"answer":"B","explanation":"根據《工作場所性騷擾防治措施準則》第 16 條與《職場霸凌防治措施準則》第 16 條，調查過程應避免重複詢問，且不得令當事人間或協助調查之相關人對質。"},{"id":"154","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"在《性別平等工作法律扶助辦法》中，受僱者若因性騷擾致生法律訴訟，關於「訴訟案件之代理酬金」補助，下列敘述何者正確？","options":{"A":"每一審級之補助金額均無上限，按律師公會規費核實支付","B":"同一案件之補助以一審為限","C":"每一審級之補助金額有上限，且同一案由以三審為限","D":"僅提供法律諮詢，不補助律師代理酬金"},"answer":"C","explanation":"根據《性別平等工作法律扶助辦法》，為減輕被害人負擔，政府提供律師代理酬金補助，但每一審級設有金額上限，且同一案由最高補助至第三審。"},{"id":"155","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"非主管勞工 A 被主管 B 刻意分配其「能力上明顯無法達成」的工作（例如要求不諳德文的人員處理德文合約），若此行為具持續性，根據霸凌防治指導手冊，這屬於霸凌樣態中的哪一類？","options":{"A":"工作破壞（阻礙資訊獲取）","B":"名譽侵害（公開羞辱）","C":"權力濫用（要求過高）","D":"社交孤立（排除互動）"},"answer":"C","explanation":"根據《職場霸凌防治指導手冊》，刻意分配能力上明顯無法達成之工作，屬於權力濫用中的「要求過高」樣態。"},{"id":"156","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"若事業單位僱用勞工人數為 150 人，關於其「職場霸凌調查小組」之組成，下列何者符合《職場霸凌防治措施準則》之強制性規範？","options":{"A":"成員至少 3 人，外部專業人士比例不得少於三分之一","B":"成員至少 3 人，外部專業人士比例不得少於二分之一","C":"成員至少 5 人，任一性別比例不得少於二分之一","D":"成員至少 3 人，必須全數由外部專家擔任以確保公正"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》第 14 條，僱用勞工人數在 100 人以上之雇主，調查小組成員至少 3 人，外部專業人士比例不得少於二分之一，且任一性別比例不得少於三分之一。"},{"id":"157","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"受僱者遭受性騷擾時，若行為人為「最高負責人」，申訴人向地方主管機關提起申訴。在調查期間，申訴人可向雇主主張何種權益，且雇主不得拒絕？","options":{"A":"要求雇主先行開除該最高負責人","B":"要求雇主提供無限期的帶薪假","C":"申請調整職務或工作型態（如遠距辦公）至調查結果送達之日起 30 日內","D":"要求雇主立即給予 10 倍的懲罰性賠償金"},"answer":"C","explanation":"根據《性別平等工作法》第 32 條之 2，被申訴人為最高負責人時，在調查期間，申訴人得申請調整職務或工作型態，雇主不得拒絕。"},{"id":"158","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"在職場霸凌的「申復」程序中，若申復審議會議發現「原調查小組之組成不符性別比例規定」，則此瑕疵在法律上被定義為？","options":{"A":"些微瑕疵，不影響結果，維持原決定","B":"重大瑕疵，應組成申復調查小組再行調查","C":"程序瑕疵，應由原調查小組補簽名即可","D":"違法失職，應直接判定被申訴人霸凌成立"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》第 22 條，組成不合法（如性別比例不符）屬於調查程序之重大瑕疵，應組成申復調查小組再行調查。"},{"id":"159","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"關於「跟蹤騷擾防制法」與職場性騷擾的關聯，若行為人對同仁進行反覆、持續且「與性有關」之騷擾，導致受害者畏怖，下列敘述何者錯誤？","options":{"A":"受害者可同時依《性工法》向公司申訴，並依《跟騷法》向警察機關報案","B":"行為人若攜帶凶器犯之，可處 5 年以下有期徒刑","C":"行為人若僅是單純暗戀並每日寫情書，不涉及性別歧視，即不適用《跟騷法》","D":"警察機關經調查後得核發告誡書，行為人 2 年內再犯可申請保護令"},"answer":"C","explanation":"《跟蹤騷擾防制法》規範之行為須與「性或性別」有關。單純追求若違反意願、具持續性且使人心生畏怖、影響生活，仍可能構成跟蹤騷擾，不以具備「歧視言詞」為限。"},{"id":"160","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"雇主非因接獲申訴而知悉性騷擾情形時（例如經由媒體報導得知），應採取立即有效之糾正及補救措施。下列何者「非」法規要求之必要動作？","options":{"A":"就相關事實進行必要之釐清及查證","B":"即使被害人無意願，仍應強制其與行為人對質以保全證據","C":"告知被害人得主張之權益及各種救濟途徑","D":"依被害人意願，提供或轉介諮詢、醫療或心理諮商處理"},"answer":"B","explanation":"根據《工作場所性騷擾防治措施準則》第 6 條，即使雇主主動介入，仍應尊重被害人意願，且嚴禁強制對質。"},{"id":"161","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"在性騷擾防治中，所謂「合理被害人標準」的運用，主要目的為何？","options":{"A":"確保只有完全沒有過失的受害者才能獲得賠償","B":"作為調查時的參考，評估相同背景下之一般人是否會有相同受侵犯感受","C":"用來證明行為人主觀上是否有性騷擾意圖","D":"為了減輕雇主的調查責任"},"answer":"B","explanation":"根據指導手冊，職場性騷擾認定並非全然僅憑被害人主觀感受，而是參考「合理被害人」標準，即評估一般人在相同環境下是否感到冒犯。"},{"id":"162","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"依據《性別平等工作法》，受僱者遭受性騷擾後若欲提起「民事損害賠償」，對於雇主之「連帶損害賠償責任」，下列敘述何者正確？","options":{"A":"雇主無論是否已盡防治義務，均須負絕對責任","B":"雇主若證明已遵行法律規定，且對事情發生已盡力防止，仍發生性騷擾者，不負賠償責任","C":"雇主免除連帶責任後，法院不可再令雇主負擔任何賠償","D":"被害人僅能向行為人請求，不得向雇主請求"},"answer":"B","explanation":"根據《性別平等工作法》第 27 條，雇主證明已盡力防止者得免除責任。但法院得因被害人之聲請，斟酌雇主與被害人經濟狀況，令雇主為全部或一部之補償。"},{"id":"163","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"職場霸凌申訴案件中，雇主應於受理申訴翌日起幾日內，依中央主管機關公告之方式登錄系統？","options":{"A":"3 個工作日","B":"7 個工作日","C":"10 個工作日","D":"15 個工作日"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》第 11 條，雇主應於受理翌日起 7 個工作日內登錄系統。"},{"id":"164","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"關於「權勢性騷擾」的定義，在《性騷擾防治法》中是指行為人利用何種關係進行騷擾？","options":{"A":"僅限於上下級職務關係","B":"因教育、訓練、醫療、公務、業務、求職等受自己監督、照護、指導關係","C":"僅限於公司最高負責人與基層員工","D":"僅限於師生關係"},"answer":"B","explanation":"根據《性騷擾防治法》第 2 條，權勢性騷擾涵蓋多種因監督、照護、指導而產生的權力不對等關係。"},{"id":"165","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"若地方主管機關調查認定「最高負責人」性騷擾成立，可對該負責人裁處多少罰鍰？","options":{"A":"1 萬元至 10 萬元","B":"2 萬元至 30 萬元","C":"1 萬元至 100 萬元","D":"50 萬元至 200 萬元"},"answer":"C","explanation":"根據《性別平等工作法》第 38 條之 2，最高負責人經地方主管機關認定有性騷擾者，處新臺幣 1 萬元以上 100 萬元以下罰鍰。"},{"id":"166","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"職場霸凌調查報告完成後，申訴處理單位應於多久內作成成立與否之決定？","options":{"A":"10 個工作日","B":"15 個工作日","C":"1 個月","D":"2 個月"},"answer":"C","explanation":"根據《職場霸凌防治措施準則》第 18 條，申訴處理單位應於調查報告完成之日起 1 個月內作成決定。"},{"id":"167","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"在職場霸凌防治中，「社交孤立」樣態不包含下列何者？","options":{"A":"刻意冷落或忽視特定勞工","B":"故意不讓勞工參加必要的重要會議","C":"基於業務需要，將勞工調動至不同辦公室但維持原有互動管道","D":"排除勞工參與組織內的正式事務活動"},"answer":"C","explanation":"社交孤立強調「刻意排除」與「切斷互動」。正常的職務調動若無霸凌意圖且不影響正常互動，不屬於此樣態。"},{"id":"168","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"若受僱者（申訴人）對職場霸凌申訴決定不服提起申復，申訴處理單位應於接獲申復後幾日內召開「申復審議會議」？","options":{"A":"7 個工作日","B":"10 個工作日","C":"14 日","D":"30 日"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》第 22 條，雇主於接獲申復後，應於 10 個工作日內召開會議。"},{"id":"169","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"派遣勞工若遭受「要派單位」之員工性騷擾，依指導手冊建議，應如何處理？","options":{"A":"僅能向派遣公司申訴","B":"要派單位與派遣公司應共同調查，並將結果通知雙方及當事人","C":"因為不是要派單位的員工，要派單位無須負擔任何法律責任","D":"直接向地方主管機關申訴，公司內部無須介入"},"answer":"B","explanation":"派遣勞工遭受騷擾時，要派單位亦視為雇主，應與派遣公司共同履行糾正及補救措施之義務。"},{"id":"170","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"職場霸凌事件中，被申訴人若為「最高負責人」，勞工提起申訴的「法律權限」為何？","options":{"A":"必須先向公司內部人事部門申訴，不服後才可向政府申請","B":"得「逕向」直轄市或縣（市）主管機關提起申訴","C":"僅能向警察局報案，勞政機關無權干涉負責人","D":"法律無特別規定，仍須依循內部申訴流程"},"answer":"B","explanation":"根據《職業安全衛生法》第 22 條之 3 與《職場霸凌防治措施準則》第 6 條，被申訴人為最高負責人時，勞工得逕向地方主管機關提起申訴。"},{"id":"171","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"若性騷擾申訴案件之調查發現「應迴避而未迴避」之情形，受僱者得向誰申請令其迴避？","options":{"A":"工會","B":"地方政府勞工局","C":"雇主","D":"行為人本人"},"answer":"C","explanation":"根據《工作場所性騷擾防治措施準則》第 15 條，申訴人得向「雇主」申請令其迴避，雇主亦應主動命其迴避。"},{"id":"172","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"職場霸凌「申復調查小組」的組成中，關於「外部專業人士」的比例，在 100 人以上企業之規定為何？","options":{"A":"不得少於二分之一","B":"不得少於三分之一","C":"不得少於三分之二","D":"必須全數由外部專家組成"},"answer":"C","explanation":"根據《職場霸凌防治措施準則》第 22 條，針對 100 人以上企業，申復調查小組之外部專業人士比例不得少於三分之二。"},{"id":"173","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"雇主對於職場霸凌防治之「執行紀錄」（包含預防、申訴、調查、申復等處理過程）應保存多久？","options":{"A":"1 年","B":"3 年","C":"5 年","D":"永久保存"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》第 26 條，相關處理過程及結果紀錄應留存 3 年。"},{"id":"174","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"若某勞工在 115 年 8 月遭受霸凌，且行為於當月結束。該勞工若於 119 年才提出申訴，雇主得如何處理？","options":{"A":"必須依然進行完整調查，不可拒絕","B":"得不予受理，因為已自霸凌行為終了時起逾 3 年","C":"依然受理，但不能處罰行為人","D":"轉送警察機關處理即可"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》第 8 條，自職場霸凌行為終了時起，逾 3 年者不予受理。"},{"id":"175","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"下列何項「不屬於」《性騷擾防治法》所規範之樣態？","options":{"A":"行為人展示色情照片，損害他人人格尊嚴","B":"行為人以提供加薪作為要求同仁服從性要求的條件","C":"行為人乘人不及抗拒親吻同仁臉頰","D":"媒體報導中揭露性騷擾被害人之姓名"},"answer":"B","explanation":"選項 B 屬於「交換式性騷擾」，涉及對受僱者工作條件之影響，優先適用《性別平等工作法》。《性騷法》主要適用於不特定人或公共場所樣態。"},{"id":"176","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"事業單位僱用勞工人數在 30 人以上未達 100 人者，其「職場霸凌申訴案件」的標準處理期限（作成決定）為何？","options":{"A":"自接獲申訴翌日起 2 個月內","B":"自接獲申訴翌日起 3 個月內","C":"自接獲申訴翌日起 4 個月內","D":"無時效限制"},"answer":"C","explanation":"根據《職場霸凌防治措施準則》第 21 條，僱用勞工人數 30 人以上未達 100 人之雇主，處理期限為 4 個月；未達 30 人者則為 3 個月。"},{"id":"177","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"雇主違反《性別平等工作法》第 13 條第 2 項，即知悉性騷擾而「未採取立即有效之糾正補救措施」時，主管機關除罰鍰外，尚應執行何種處分？","options":{"A":"公布雇主名稱及負責人姓名","B":"勒令停業","C":"沒收公司當年利潤","D":"強制雇主參加 100 小時性平教育"},"answer":"A","explanation":"根據《性別平等工作法》第 38 條之 1，違反第 13 條者應公布其名稱、負責人姓名、處分期日、違反條文及罰鍰金額。"},{"id":"178","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"受僱者遭受性騷擾致生法律訴訟，雇主應給予公假。若雇主違反此規定不給公假，依法可處多少罰鍰？","options":{"A":"1 萬元至 10 萬元","B":"2 萬元至 30 萬元","C":"5 萬元至 50 萬元","D":"10 萬元至 100 萬元"},"answer":"B","explanation":"根據《性別平等工作法》第 38 條，違反第 27 條第 4 項者，處新臺幣 2 萬元以上 30 萬元以下罰鍰。"},{"id":"179","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"職場霸凌定義中，「情節重大」者之認定，與一般霸凌樣態有何顯著不同？","options":{"A":"必須造成被害人住院才算重大","B":"必須有 3 名以上證人才算重大","C":"「不以持續發生為必要」，單次行為若極端惡劣亦可構成","D":"情節重大必須由地方政府認定，雇主無權認定"},"answer":"C","explanation":"根據《職業安全衛生法》第 22 條之 1，職場霸凌通常具持續性，但若情節重大者，不以持續發生為必要。"},{"id":"180","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"某非主管員工 A 因不服公司的職場霸凌申訴決定，向公司提出申復。若該案發現有「影響原調查認定之新事證」，申復審議期限得如何延長？","options":{"A":"不得延長","B":"得展延 10 個工作日","C":"得展延 30 日","D":"得展延至調查清楚為止"},"answer":"C","explanation":"根據《職場霸凌防治措施準則》第 23 條，如屬應再行調查者，其決定期限得展延 30 日。"},{"id":"181","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"依據 2025 年新修法規，僱用勞工人數達幾人以上之事業單位，應設置「具備性別意識之專業人士」參與申訴處理單位？","options":{"A":"10 人","B":"30 人","C":"100 人","D":"500 人"},"answer":"B","explanation":"根據《工作場所性騷擾防治措施準則》第 12 條，僱用受僱者 30 人以上之雇主，申訴處理單位應有具備性別意識之專業人士。"},{"id":"182","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"職場霸凌調查報告之「事實認定」部分，應根據下列何種原則進行論斷？","options":{"A":"誰比較資深就信誰","B":"罪疑唯輕原則","C":"經驗法則與論理法則","D":"申訴人必須負負擔 100% 的舉證責任"},"answer":"C","explanation":"根據指導手冊，調查結果應經過「經驗法則與論理法則」綜合判斷所得各項證據。"},{"id":"183","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"若申訴人與被申訴人分屬 A、B 兩家不同公司（具業務往來關係），受害者向 A 公司申訴。關於調查程序，下列敘述何者正確？","options":{"A":"A 公司與 B 公司無須溝通，各查各的","B":"由被害人所屬之 A 公司主導調查，B 公司應予配合並參與","C":"必須由被害人同時向兩家公司提出兩份申訴才可啟動","D":"應直接由勞工局調查，兩家公司皆無權調查"},"answer":"B","explanation":"根據指導手冊，不同事業單位人員間之騷擾，被害人所屬公司接獲申訴後應通知他方共同協商，他方公司應適時參與並提供必要協助。"},{"id":"184","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"性騷擾申復審議會議中，關於「當事人參與權」之規定為何？","options":{"A":"為了效率，申復人不得列席陳述意見","B":"應給予申復人陳述意見之機會，並得邀原調查小組成員列席","C":"僅能透過書面，嚴禁當面陳述","D":"只有律師可以列席陳述"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》第 22 條，申復會議進行時應給予申復人陳述意見之機會。"},{"id":"185","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"雇主在知悉性騷擾發生後，採取「隔離措施」時，下列何種做法是「違法」的？","options":{"A":"徵得被害人同意後調整其座位","B":"在未徵得被害人同意下，逕行降低其薪資並調動職務","C":"暫時停止被申訴人之職務（若具權勢地位且情節重大）","D":"調整雙方業務內容以減低互動"},"answer":"B","explanation":"根據《性別平等工作法》第 13 條與相關準則，隔離措施不得對被害人之薪資等勞動條件作不利之變更。"},{"id":"186","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"關於職場霸凌的「協調機制」，下列何者「不符合」法規程序？","options":{"A":"協調必須經當事人雙方同意","B":"協調期間不計入 2 個月的調查報告期限","C":"協調若成立，必須作成紀錄並由雙方簽署","D":"協調若不成立，雇主得視同申訴案已結案，無須再行調查"},"answer":"D","explanation":"根據《職場霸凌防治措施準則》第 13 條，協調不成立者，雇主應續行調查。"},{"id":"187","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"若媒體業者報導性騷擾事件時，「報導中揭露足以辨識被害人身分之資訊」，依《性騷擾防治法》最高可處多少罰鍰？","options":{"A":"10 萬元","B":"30 萬元","C":"60 萬元","D":"100 萬元"},"answer":"C","explanation":"根據《性騷擾防治法》第 26 條與第 30 條，違反被害人隱私保護之媒體，處新臺幣 6 萬元以上 60 萬元以下罰鍰。"},{"id":"188","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"職場霸凌中「名譽侵害」樣態，不包含下列何項？","options":{"A":"刻意散布關於同事之不實負面訊息","B":"揭露同事之個人隱私","C":"主管因其工作疏失而在會議中對事不對人地進行檢討","D":"在同事間散布謠言以破壞其職務升遷機會"},"answer":"C","explanation":"正常的績效管理或對工作疏失的檢討，只要不涉及人身攻擊或散布虛構事實，不屬於名譽侵害之霸凌樣態。"},{"id":"189","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"非主管人員遭受職場霸凌致使身心受創，關於「心理諮商協助」之責任，下列敘述何者正確？","options":{"A":"員工應自費尋求專業諮商，與公司無關","B":"大型雇主（500 人以上）應視被害人請求提供至少 2 次心理諮商協助","C":"雇主必須在公司內設立心理醫生職位","D":"法律無任何心理諮商補助之規定"},"answer":"B","explanation":"根據職場性騷擾申訴處理指導手冊及相關防治手冊，大型雇主應提供至少 2 次諮商協助。"},{"id":"190","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"若被霸凌勞工「拒絕配合調查」，調查小組應如何處置以符合法規？","options":{"A":"直接撤銷該申訴案","B":"通知限期配合，屆期仍不配合者，得逕行作成調查報告","C":"暫停該員工之所有職權直到其配合為止","D":"處以申訴人 1 萬元罰鍰"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》第 17 條，當事人無正當理由拒絕調查，經限期仍未配合者，小組得逕行作成報告。"},{"id":"191","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"性騷擾申訴案件受理後，若發現「申訴不合法定程式」但可補正，雇主應通知其於幾日內補正？","options":{"A":"3 日","B":"7 日","C":"14 日","D":"30 日"},"answer":"C","explanation":"根據《性騷擾防治法》第 14 條及相關指導手冊，申訴不合法定程式者，應通知其於 14 日內補正。"},{"id":"192","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"在職場霸凌調查訪談時，對於「錄音或錄影」之規定，下列何者正確？","options":{"A":"調查人員應以此輔助並作成紀錄，但受訪談者不得自行錄音或錄影","B":"受訪者可以隨意錄音並發布至社群平台","C":"嚴禁任何形式之錄音，僅能靠紙筆記錄","D":"必須經被申訴人同意後才可錄音"},"answer":"A","explanation":"根據《職場霸凌防治措施準則》第 16 條，應以錄音影輔助，但受訪談者不得自行錄製，以維護保密性。"},{"id":"193","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"若行為人利用職務對部屬進行性要求，部屬「服從」後獲得加薪，此仍構成何種性騷擾？","options":{"A":"交換式性騷擾","B":"敵意式性騷擾","C":"這屬於雙方合意之職場利益交換，不構成性騷擾","D":"僅屬於職場倫理規範問題"},"answer":"A","explanation":"交換式性騷擾係指以服從或拒絕性要求，作為獲取或喪失工作利益之條件。即便被害人因恐懼或迫於權勢而「服從」，行為依然成立。"},{"id":"194","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"職場霸凌防治教育訓練，針對「各級主管及調查人員」應另行增辦哪些內容？","options":{"A":"辦理更高等級的體能訓練","B":"溝通技巧、管理、協調及申訴處理實務","C":"如何降低被員工申訴的風險","D":"進階法律辯論技巧"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》第 6 條及指導手冊，相關人員應接受溝通、協調與處理實務之專業訓練。"},{"id":"195","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"非主管人員若「目睹」同事遭受霸凌，根據手冊，其具備何種能力的培養最為關鍵？","options":{"A":"舉報他人隱私的能力","B":"旁觀者介入能力","C":"律師辯論能力","D":"避免自己被牽連的躲避能力"},"answer":"B","explanation":"教育訓練應包含旁觀者介入課程，使目睹者能採取行動協助被害人，營造友善職場。"},{"id":"196","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"雇主依《性別平等工作法》應「公布行為人之姓名」，此動作之法律依據與時機為何？","options":{"A":"接獲申訴時立即公布","B":"經調查認定性騷擾成立，且依法處以罰鍰後","C":"被申訴人拒絕道歉時","D":"只要有疑似樣態即可公布"},"answer":"B","explanation":"法規規定於行政處分確定後（如違反防治義務遭罰），主管機關應公布相關資訊，作為對行為人或雇主之警示。"},{"id":"197","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"若勞工因性騷擾申訴被雇主「報復性開除」，此舉違反了哪項法律原則？","options":{"A":"誠實信用原則","B":"報復禁止原則（不當差別待遇禁止）","C":"契約自由原則","D":"比例原則"},"answer":"B","explanation":"根據《性別平等工作法》第 36 條與《職場霸凌防治措施準則》第 20 條，不得因勞工申訴而給予解僱等不利處分。"},{"id":"198","role":"非主管","category":"職場霸凌","difficulty":"高難度","question":"職場霸凌調查報告中的「處理建議」，應具備何種特性？","options":{"A":"僅能針對行為人進行金錢罰款建議","B":"應包含對行為人之懲戒、被害人之保護及預防再發措施","C":"應建議被害人暫時留職停薪","D":"應建議公司關閉發生霸凌的部門"},"answer":"B","explanation":"調查報告應針對懲處與預防措施提出明確建議，以解決爭端並改善環境。"},{"id":"199","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"關於「最高負責人」之範圍，下列何者不包含在內？","options":{"A":"學校校長","B":"公司董事長","C":"部門資深資深副理","D":"行政法人理事主席"},"answer":"C","explanation":"最高負責人指機關首長、校長、董事長或對外代表人。部門經理或主管雖有權力，但不符合最高負責人之法定定義。"},{"id":"200","role":"非主管","category":"性騷擾防治","difficulty":"高難度","question":"若勞工遭受客戶（不特定人）性騷擾，雇主在「糾正及補救措施」上，應如何「保全證據」？","options":{"A":"雇主無須參與，請勞工自行處理","B":"協助調閱並留存工作場所之監視器畫面","C":"強制客戶留在現場直到警察到達","D":"將被害勞工與該客戶的照片貼在公司門口"},"answer":"B","explanation":"根據準則，雇主應協助申訴人保留相關證據（如影音、對話紀錄），作為後續調查之用。"},{"id":"201","role":"主管","category":"職場霸凌防治","difficulty":"低難度","question":"身為主管，在下達指揮命令或進行績效糾正時，應如何避免被認定為「職場霸凌」？","options":{"A":"A. 只要是為了公司利益，口氣再差都不算霸凌","B":"B. 應確保行為具備業務上之必要性與合理範圍，並避免持續性的侮辱或脅迫","C":"C. 只要在公開場合罵人，有證人在場就不算霸凌","D":"D. 績效管理是主管絕對權限，法規不予干涉"},"answer":"B","explanation":"職場霸凌之判斷核心在於行為是否「逾越業務上必要且合理範圍」。主管職權與霸凌的界線在於「業務必要性」，應確保管理手段與目的成比例，避免損害勞工人格尊嚴。"},{"id":"202","role":"主管","category":"性騷擾防治","difficulty":"低難度","question":"根據《工作場所性騷擾防治措施準則》，僱用受僱者達 30 人以上之雇主，對於「擔任主管職務者」應實施何種性質的教育訓練？","options":{"A":"A. 僅需在到職時實施一次性訓練","B":"B. 每年定期舉辦防治性騷擾之教育訓練","C":"C. 只要參加一般員工的基礎課程即可","D":"D. 法規未強制主管參加，僅鼓勵參加"},"answer":"B","explanation":"根據《工作場所性騷擾防治措施準則》第 8 條，針對擔任主管職務者，雇主每年應定期舉辦相關教育訓練，以強化其性別敏感度與事件處理能力，此為企業合規之法定責任。"},{"id":"203","role":"主管","category":"性騷擾防治","difficulty":"低難度","question":"若主管對下屬明示或暗示性要求，並以此作為「陞遷」 duel 「考績」之交換條件，這在法律上被定義為？","options":{"A":"A. 敵意式性騷擾","B":"B. 職場霸凌","C":"C. 交換式性騷擾","D":"D. 正常績效考核"},"answer":"C","explanation":"主管利用職務權限，以性要求作為勞務契約存續、陞遷、考績等之交換條件，即屬「交換式性騷擾」，其違法性在於利用權勢侵害受僱者之工作權。"},{"id":"204","role":"主管","category":"職場霸凌防治","difficulty":"低難度","question":"身為單位主管，若知悉所屬部屬間發生疑似霸凌事件，但被害人「不願意」提出正式申訴，主管應如何處理始符合法規？","options":{"A":"A. 既然被害人不申訴，主管即無須介入","B":"B. 仍應採取立即有效之糾正及補救措施，進行必要事實釐清，並提供被害人協助","C":"C. 應強制被害人立即填寫申訴書，否則給予曠職","D":"D. 將此事件私下告知全組同仁，要求大家共同公斷"},"answer":"B","explanation":"雇主或主管非因接獲申訴而知悉時，仍負有採取立即有效補救措施之義務。即便被害人不申訴，主管仍應主動釐清事實並提供保護協助，否則將承擔未盡防治責任之法律風險。"},{"id":"205","role":"主管","category":"性騷擾防治","difficulty":"低難度","question":"在職場霸凌調查期間，雇主若決定暫時停止「被申訴主管」之職務，下列哪項條件是法規要求的先行要件？","options":{"A":"A. 被申訴人為最高負責人","B":"B. 經調查小組一致通過","C":"C. 被申訴人具權勢地位且情節重大，有先行停止之必要","D":"D. 只要有人申訴即可立即停職"},"answer":"C","explanation":"根據《性別平等工作法》第 32 條之 3，被申訴人具權勢地位且情節重大時，雇主得於調查期間先行停止或調整其職務，以避免調查受權勢干擾。"},{"id":"206","role":"主管","category":"職場霸凌防治","difficulty":"低難度","question":"若主管 A 因不滿部屬 B，刻意分配 B 的能力「明顯無法達成」的工作（例如要求不諳德文的人處理德文專業標案），這屬於霸凌中的哪種樣態？","options":{"A":"A. 社交孤立","B":"B. 權力濫用（要求過高）","C":"C. 工作破壞","D":"D. 名譽侵害"},"answer":"B","explanation":"刻意分配不合理的工作目標或與能力明顯不符之工作，且樣態屬於時間或能力上要求過高者，視為「權力濫用」之霸凌行為，其行為已逾越管理合理範圍。"},{"id":"207","role":"主管","category":"性騷擾防治","difficulty":"低難度","question":"關於性騷擾申訴處理單位的組成，僱用受僱者達 30 人以上之機關，關於「性別比例」有何強制規定？","options":{"A":"A. 應全部由女性擔任","B":"B. 任一性別比例不得少於三分之一","C":"C. 女性成員比例不得低於二分之一","D":"D. 無性別比例規定，由主管指定即可"},"answer":"C","explanation":"根據《工作場所性騷擾防治措施準則》第 12 條，30 人以上機關之申訴處理單位，女性成員比例不得低於二分之一，旨在確保調查過程具備性別敏感度與平衡視角。"},{"id":"208","role":"主管","category":"性騷擾防治","difficulty":"低難度","question":"主管若在非工作時間，對所屬部屬進行「持續性」的性騷擾，是否適用《性別平等工作法》？","options":{"A":"A. 不適用，非工作時間一律適用《性騷擾防治法》","B":"B. 適用，因行為人為主管，具備權勢關係且為持續性","C":"C. 僅適用於公司內部聚會發生時","D":"D. 視受害者是否感到畏怖而定"},"answer":"B","explanation":"受僱者於非工作時間遭受所屬事業單位之主管為持續性性騷擾，因具備權勢影響力，仍優先適用《性別平等工作法》，雇主應啟動內部調查。"},{"id":"209","role":"主管","category":"法律程序與責任","difficulty":"低難度","question":"若機關首長涉及性騷擾行為且情節重大，上級機關於調查期間得採取的先行措施，下列何者「錯誤」？","options":{"A":"A. 先行停止職務","B":"B. 先行調整職務","C":"C. 沒收其當年度所有考績獎金","D":"D. 停職期間得發給半數之本俸"},"answer":"C","explanation":"先行措施旨在避免權勢影響調查，主要為職務調整或停職。沒收獎金需經調查屬實後按人事法令懲處，不屬於調查期間之「先行保全措施」。"},{"id":"210","role":"主管","category":"職場霸凌防治","difficulty":"低難度","question":"在職場霸凌防治中，主管若為了逼退部屬，故意不讓其參加必要之重要會議，這屬於何種樣態？","options":{"A":"A. 社交孤立","B":"B. 權力濫用","C":"C. 工作破壞","D":"D. 正常行政調度"},"answer":"A","explanation":"對特定人刻意排擠、忽視、冷落，或不讓其參與必要之重要會議或活動，符合「社交孤立」樣態，會損害勞工對職場訊息的近用權及歸屬感。"},{"id":"211","role":"主管","category":"法律程序與責任","difficulty":"低難度","question":"依據《性別平等工作法》第 27 條第 4 項，受僱者因遭受主管性騷擾致生法律訴訟，於司法機關通知到庭期間，雇主應給予何種假別？","options":{"A":"A. 事假","B":"B. 病假","C":"C. 公假","D":"D. 特別休假"},"answer":"C","explanation":"根據《性別平等工作法》第 27 條第 4 項，被害人因性騷擾致生法律訴訟，到庭參與程序期間，雇主應給予公假。主管若拒絕將構成違法，最高可處 30 萬元罰鍰。"},{"id":"212","role":"主管","category":"性騷擾防治","difficulty":"低難度","question":"若主管 A 因不滿部屬 B 參與作證，而將 B 調動至偏遠單位且無正當理由。主管 A 此舉違反了什麼？","options":{"A":"A. 契約自由原則","B":"B. 報復禁止規定（不當差別待遇）","C":"C. 指揮監督權","D":"D. 隱私保密義務"},"answer":"B","explanation":"《性別平等工作法》第 36 條規定報復禁止。雇主或主管不得因受僱者提起申訴或協助調查，而予以解僱、調職或其他不利處分。此為合規紅線，違反者重罰。"},{"id":"213","role":"主管","category":"法律程序與責任","difficulty":"低難度","question":"機關知悉性騷擾發生時，若行為人為該機關之首長，受僱者得向哪個單位提起外部申訴？","options":{"A":"A. 機關內部的人事處","B":"B. 警察局","C":"C. 地方主管機關（如直轄市或縣市政府勞工局）","D":"D. 監察院"},"answer":"C","explanation":"行為人為機關首長或最高負責人時，為確保調查公正，受僱者得逕向地方主管機關（勞工局或社會局）提起外部申訴，由公權力介入調查。"},{"id":"214","role":"主管","category":"法律程序與責任","difficulty":"低難度","question":"針對「職場霸凌調查小組」之成員資格，下列何項敘述符合 2026 年施行的《職場霸凌防治措施準則》規範？","options":{"A":"A. 成員必須全部為該機關之高階主管","B":"B. 100 人以上企業，外部專業人士比例不得少於二分之一","C":"C. 成員應全部由女性擔任以示對弱勢之保護","D":"D. 只要有相關專業背景，不論性別比例"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》，100 人以上企業之調查小組外部專業人士比例不得少於二分之一，旨在強化調查之公正性與外部監督，防止內部包庇。"},{"id":"215","role":"主管","category":"性騷擾防治","difficulty":"低難度","question":"主管在處理性騷擾或霸慶案件時，關於「證據保全」之責任，下列何者正確？","options":{"A":"A. 為了效率，只要口頭訪談即可，無須留存文字","B":"B. 應協助申訴人保留監視器畫面、電子郵件等相關證據，且不得湮滅證據","C":"C. 若被申訴人是同級主管，可以基於交情予以隱匿","D":"D. 證據應在調查結束後立即銷毀以保護隱私"},"answer":"B","explanation":"處理事件時，不得有偽造、變造、湮滅或隱匿證據之情事。主管負有法律上的「保全義務」，應協助受害者固定證據以利後續調查認定。"},{"id":"216","role":"主管","category":"性騷擾防治","difficulty":"低難度","question":"若機關內發生性騷擾事件，主管機關裁處雇主罰鍰後，依《性別平等工作法》第 38 條之 1 應採取何種公示處分？","options":{"A":"A. 在公司門口貼海報","B":"B. 公布機關名稱及首長（負責人）姓名","C":"C. 強制首長公開道歉","D":"D. 沒收首長之考績金"},"answer":"B","explanation":"根據《性別平等工作法》第 38 條之 1，違反防治義務者，主管機關應公布其名稱及負責人姓名。此屬於行政處分後的「公示義務」，旨在透過社會監督警示企業合規。"},{"id":"217","role":"主管","category":"性騷擾防治","difficulty":"低難度","question":"主管若對部屬進行「不適當之凝視」（如持續緊盯胸部），依據指導手冊樣態，這屬於？","options":{"A":"A. 肢體行為型性騷擾","B":"B. 言語型性騷擾","C":"C. 社交孤立","D":"D. 權力濫用"},"answer":"A","explanation":"不適當之凝視、嗅聞、觸摸身體等，均屬性騷擾樣態之「肢體行為（廣義）」範疇。主管應注意身體分際與視覺停留之合理性。"},{"id":"218","role":"主管","category":"法律程序與責任","difficulty":"低難度","question":"關於「職場霸凌」申訴案件的處理期限，事業單位規模 100 人以上者，雇主應於多久內完成調查報告？","options":{"A":"A. 1 個月","B":"B. 2 個月，必要時得延長 1 個月","C":"C. 3 個月，不得延長","D":"D. 無時效限制"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》第 17 條，調查小組應自成立後翌日起 2 個月內完成報告，必要時得延長 1 個月。逾期未結可能導致程序重大瑕疵。"},{"id":"219","role":"主管","category":"性騷擾防治","difficulty":"低難度","question":"若主管在執行職務時，被「不特定人」（如民眾、客戶）性騷擾，該主管所屬之雇主應承擔何種義務？","options":{"A":"A. 因為是外人所為，雇主無須負責","B":"B. 依然負有糾正及補救措施責任，應協助主管申訴、保全證據並提供必要防護","C":"C. 雇主僅需協助通報警察局，其餘不理","D":"D. 該主管應自行承擔職業風險"},"answer":"B","explanation":"雇主對受僱者負有安全環境保障義務。遭不特定人性騷擾時，雇主仍應採取糾正補救措施，包含調整環境與協助法律救濟。"},{"id":"220","role":"主管","category":"性騷擾防治","difficulty":"低難度","question":"在機關首長為行為人之性騷擾案件中，若地方主管機關認定成立，可對該首長裁處最高多少罰鍰？","options":{"A":"A. 10 萬元","B":"B. 50 萬元","C":"C. 100 萬元","D":"D. 500 萬元"},"answer":"C","explanation":"最高負責人（首長）經認定有性騷擾者，處新臺幣 1 萬元以上 100 萬元以下罰鍰。此高額罰鍰反映了法律對權勢性騷擾的嚴厲譴責。"},{"id":"221","role":"主管","category":"法律程序與責任","difficulty":"低難度","question":"主管在申訴處理過程中，若發現調查小組成員是其中一方當事人的「四親等內血親」，應如何處置始符合法規？","options":{"A":"A. 只要該成員聲明公正，即可繼續參與","B":"B. 應令該成員自行迴避，主管亦應主動命其迴避","C":"C. 交由申訴人決定是否保留","D":"D. 僅能擔任紀錄人員"},"answer":"B","explanation":"為確保調查之公平與客觀，參與調查人員與當事人有四親等內血親關係者，屬於「強制迴避」情形。主管應主動命其迴避以防程序違法。"},{"id":"222","role":"主管","category":"法律程序與責任","difficulty":"低難度","question":"針對職場霸凌案件，若雙方主管達成「協調」共識，協調期間是否計入「調查報告」的 2 個月時限內？","options":{"A":"A. 是，應包含在內","B":"B. 否，調查過程之協調期間，不予計入","C":"C. 視機關內部規定而定","D":"D. 只要協調中，時效永久停止"},"answer":"B","explanation":"根據《職場霸凌防治措施準則》第 17 條，調查報告期限為 2 個月，但為了鼓勵雙方和解，調查過程之協調期間「不予計入」時效。"},{"id":"223","role":"主管","category":"職場霸凌防治","difficulty":"低難度","question":"身為機關主管，在辦理「預防職場霸凌」工作時，應定期進行哪項風險管理？","options":{"A":"A. 進行工作環境性騷擾風險類型辨識，並告知部屬","B":"B. 每天檢查部屬的私人手機訊息","C":"C. 禁止部屬在休息時間進行任何社交","D":"D. 僅在發生事情後才進行風險評估"},"answer":"A","explanation":"合規管理應「重預防輕處置」。主管應主動進行環境風險辨識，提供防護措施並事前告知，落實勞安法規義務。"},{"id":"224","role":"主管","category":"性騷擾防治","difficulty":"低難度","question":"受僱者遭受主管「權勢性騷擾」時，請求損害賠償之權利消滅時效為何？","options":{"A":"A. 發生之日起 1 年","B":"B. 知悉損害及賠償義務人起 2 年，或自性騷擾行為發生起 10 年","C":"C. 行為終了起 30 日","D":"D. 永久不消滅"},"answer":"B","explanation":"賠償請求權依《性別平等工作法》第 30 條，通常為知悉起 2 年，發生起 10 年。主管應知曉長期潛在的法律訴追風險。"},{"id":"225","role":"主管","category":"法律程序與責任","difficulty":"低難度","question":"若一名主管將部屬調動後，部屬提起霸凌申訴。主管機關調查後若認定調查程序有「重大瑕疵」，雇主應如何應對？","options":{"A":"A. 該決定依然有效，無視瑕疵","B":"B. 應依要求重新調查，且雇主不得拒絕","C":"C. 只能由申訴人去打行政訴訟","D":"D. 主管機關無權要求重新調查"},"answer":"B","explanation":"調查程序有「重大瑕疵」（如小組比例不合、未訪談重要證人）時，主管機關得要求重新調查。雇主具有配合義務，不得拒絕，否則將面臨連續裁罰。"},{"id":"226","role":"主管","category":"性騷擾防治","difficulty":"中難度","question":"身為主管，當部屬遭受性騷擾後出現情緒困擾，若該機關僱用 500 人以上，雇主應提供至少幾次心理諮商協助？","options":{"A":"A. 1 次","B":"B. 2 次","C":"C. 5 次","D":"D. 由員工自費購買諮商"},"answer":"B","explanation":"僱用 500 人以上之大型雇主，依申訴人請求，應提供至少 2 次心理諮商協助。此為企業對被害人保護義務的具體化實踐。"},{"id":"227","role":"主管","category":"法律程序與責任","difficulty":"中難度","question":"在性騷擾調查訪談紀錄中，下列哪項做法「不符合」主管的保密責任？","options":{"A":"A. 對當事人姓名及辨識資料予以保密","B":"B. 調查小組簽署保密切結書","C":"C. 在機關內的大型會議中宣讀被害人的申訴內容","D":"D. 除調查必要外，不公開相關資訊"},"answer":"C","explanation":"處理人員應嚴格保護隱私。在公開場合宣讀申訴內容將構成二次傷害，且違反性平法規之保密規定，主管將面臨嚴厲行政罰鍰。"},{"id":"228","role":"主管","category":"性騷擾防治","difficulty":"中難度","question":"依據《跟蹤騷擾防制法》，若行為人攜帶凶器對部屬進行與性有關之跟蹤，主管除了啟動性工法程序外，行為人最高可處幾年徒刑？","options":{"A":"A. 1 年","B":"B. 3 年","C":"C. 5 年","D":"D. 10 年"},"answer":"C","explanation":"攜帶凶器犯跟蹤騷擾罪者，情節嚴重，處 5 年以下有期徒刑。此類行為已超出行政申訴範疇，應即刻啟動刑事報案程序。"},{"id":"229","role":"主管","category":"職場霸凌防治","difficulty":"中難度","question":"在職場霸凌防治中，「要求過低」的樣態若被認定為霸凌，其主管的主觀意圖通常為何？","options":{"A":"A. 體恤部屬，減輕其壓力","B":"B. 意圖打擊勞工自尊心、逼其離職或羞辱（大材小用）","C":"C. 正常的試用期評估","D":"D. 提早讓優良勞工退休"},"answer":"B","explanation":"「要求過低」型霸凌（如大材小用、架空權力）常伴隨逼退意圖。主管在分配工作時，應確保符合其職等與專業，避免淪為羞辱。"},{"id":"230","role":"主管","category":"職場霸凌防治","difficulty":"中難度","question":"關於「職場霸凌調查小組」中的事業單位成員，法規要求其應接受多少小時之教育訓練？","options":{"A":"A. 1 小時","B":"B. 3 小時","C":"C. 10 小時","D":"D. 無須訓練，只要有學歷即可"},"answer":"B","explanation":"為確保調查專業，調查小組中之企業成員應接受職場霸凌防治教育訓練至少 3 小時，以充實程序知能與法規意識。"},{"id":"231","role":"主管","category":"法律程序與責任","difficulty":"中難度","question":"若受僱者（申訴人）對職場霸凌申訴成立與否之決定不服，得於收到通知之次日起幾日內提出「申復」？","options":{"A":"A. 10 日","B":"B. 15 日","C":"C. 30 日","D":"D. 60 日"},"answer":"C","explanation":"當事人不服決定，得於 30 日內提出申復。申復是內部救濟制度，旨在糾正原調查可能的疏漏或不公。"},{"id":"232","role":"主管","category":"法律程序與責任","difficulty":"中難度","question":"主管在主持職場霸凌訪談時，依規範應禁止當事人間進行下列何項行為？","options":{"A":"A. 各自陳述","B":"B. 提供人證","C":"C. 當面對質","D":"D. 提交書面說明"},"answer":"C","explanation":"調查過程嚴禁令當事人間對質。對質極易引發情緒衝突或二次傷害，主管應採「個別面談」以維護保密性與公正性。"},{"id":"233","role":"主管","category":"法律程序與責任","difficulty":"中難度","question":"機關僱用受僱者達 30 人以上，其申訴處理單位中「具備性別意識之專業人士」應如何選任？","options":{"A":"A. 必須是機關內最高職等之女性","B":"B. 可從勞動部或教育部之性平人才庫遴選，或聘請外部專家","C":"C. 由單位首長自行認定即可","D":"D. 僅能由工會代表擔任"},"answer":"B","explanation":"專業人士之選任應具公信力。合規實務上多參考政府建置之性平人才庫，以確保其調查建議符合性別意識潮流。"},{"id":"234","role":"主管","category":"性騷擾防治","difficulty":"中難度","question":"若一名主管因部屬申訴性騷擾，而惡意扣除該部屬之「年終獎金」，這違反了哪項罰則？","options":{"A":"A. 違反《職業安全衛生法》第 22 條之 2","B":"B. 違反《性別平等工作法》第 36 條（報復禁止）及第 38 條之 1","C":"C. 單純薪資爭議，無違反性平法規","D":"D. 違反《民法》誠信原則"},"answer":"B","explanation":"對申訴人予以不當差別待遇（扣薪、降職、考績不公）是嚴重的「報復行為」。依性工法可處最高 100 萬元罰鍰，並公布單位名稱。"},{"id":"235","role":"主管","category":"性騷擾防治","difficulty":"中難度","question":"在性騷擾防治宣導中，主管應學習的「旁觀者介入」課程，其核心價值為何？","options":{"A":"A. 學習如何不要被扯進糾紛","B":"B. 強化目睹者能即時採取行動協助受害者，營造集體友善環境","C":"C. 訓練主管如何監視下屬的對話","D":"D. 作為調查時的保密技巧"},"answer":"B","explanation":"「旁觀者教育」旨在打破職場冷漠。主管應鼓勵員工在目睹騷擾時，採取「非衝突式」介入，建立「零容忍」的合規文化。"},{"id":"236","role":"主管","category":"性騷擾防治","difficulty":"中難度","question":"關於「交換式性騷擾」之認定，若部屬為了保住工作而對主管的性要求「服從」，是否仍構成性騷擾？","options":{"A":"A. 否，只要雙方合意就不算","B":"B. 是，即便被害人服從，只要是以職務利益為交換條件，依然成立","C":"C. 由公司章程決定","D":"D. 視服從後的結果是否對公司有利而定"},"answer":"B","explanation":"「服從」不代表「合意」。只要主管以工作保障或利益為籌碼換取性要求，無論對方是否順從，均構成「交換式性騷擾」。"},{"id":"237","role":"主管","category":"法律程序與責任","difficulty":"中難度","question":"主管在調查職場霸凌時，若發現案情與「性騷擾行為樣態」重疊，應如何處置？","options":{"A":"A. 僅能擇一進行，否則違反一事不再理","B":"B. 應各依防治準則及性騷擾防治準則所定程序併予調查訪談，且應避免重複詢問","C":"C. 將霸凌案件暫時終止，等性騷擾查完再說","D":"D. 要求申訴人撤回其中一項"},"answer":"B","explanation":"案情重疊時應採取「併行調查」。主管應確保程序符合兩種法規之要求，且基於被害人保護原則，應盡量避免重複詢問以減少創傷。"},{"id":"238","role":"主管","category":"法律程序與責任","difficulty":"中難度","question":"主管機關在審核職場霸凌申復案時，若發現原調查小組「任一性別少於三分之一」，將會如何判定？","options":{"A":"A. 視為輕微瑕疵","B":"B. 判定為「重大瑕疵」，應組成申復調查小組再行調查","C":"C. 只要結論沒錯，不予追究","D":"D. 直接判定被申訴人霸凌不成立"},"answer":"B","explanation":"調查小組組成若不合法（如性別比例不符規範），即屬「程序重大瑕疵」。此類瑕疵會導致調查結果無效，必須依法重新組成小組調查。"},{"id":"239","role":"主管","category":"性騷擾防治","difficulty":"中難度","question":"受僱者申訴遭受「具權勢地位」主管性騷擾時，被害人得請求法院酌定損害額最高幾倍之懲罰性賠償金？","options":{"A":"A. 1 倍","B":"B. 3 倍","C":"C. 5 倍","D":"D. 10 倍"},"answer":"B","explanation":"對於權勢性騷擾，法律賦予被害人請求「懲罰性賠償」之權，法院得酌定 1 至 3 倍之金額，旨在威嚇權力濫用行為。"},{"id":"240","role":"主管","category":"法律程序與責任","difficulty":"中難度","question":"機關首長對其「前配偶」之部屬進行性騷擾，在調查小組組成時，該前配偶是否適用利益迴避規定？","options":{"A":"A. 否，既然已離婚即無親屬關係","B":"B. 是，法律明定「前配偶」應自行迴避","C":"C. 視雙方目前感情狀況而定","D":"D. 只要調查小組同意即可"},"answer":"B","explanation":"法律明定參與人員與當事人有「前配偶」關係者應強制迴避。主管必須落實此規定以維持調查中立性。"},{"id":"241","role":"主管","category":"法律程序與責任","difficulty":"中難度","question":"關於「職場霸凌」的申訴期限，被申訴人若為「一般同仁（非利用權勢）」，其申訴期限為何？","options":{"A":"A. 行為發生起 1 年","B":"B. 自職場霸凌行為終了時起，逾 3 年者不予受理","C":"C. 永久皆可申訴","D":"D. 離職後 10 年內"},"answer":"B","explanation":"一般同仁間的霸凌申訴時效為行為終了後 3 年。主管在受理時應先行檢視時效，逾期得不予受理。"},{"id":"242","role":"主管","category":"法律程序與責任","difficulty":"中難度","question":"身為主管，在訪談職場霸凌事件相關人員時，關於「錄音或錄影」之規定，下列何者正確？","options":{"A":"A. 受訪談者得自行攜帶錄音機全程記錄","B":"B. 應以錄音或錄影輔助並作成紀錄，但受訪談者「不得」自行錄音或錄影","C":"C. 嚴禁錄音錄影，僅能靠紙筆","D":"D. 必須經行為人（被申訴人）全程同意始可錄音"},"answer":"B","explanation":"調查應依程序錄製音像存證，但受訪者不得私自錄音影，以維護程序保密性並防止證據不當流出。"},{"id":"243","role":"主管","category":"法律程序與責任","difficulty":"中難度","question":"僱用勞工 30 人以上之雇主，若未訂定「職場霸凌防治措施、申訴及懲戒處理規範」，主管機關得依《職業安全衛生法》第 22 條之 2 處以多少罰鍰？","options":{"A":"A. 1 萬元至 5 萬元","B":"B. 2 萬元至 30 萬元","C":"C. 10 萬元以上","D":"D. 僅口頭警告"},"answer":"B","explanation":"根據《職業安全衛生法》第 22 條之 2 及相關裁罰基準，未訂定防治規範者可處 2 萬至 30 萬元。此罰則強調了制度化合規的強制性。"},{"id":"244","role":"主管","category":"職場霸凌防治","difficulty":"中難度","question":"主管在績效評談中，若因部屬表現不佳而「對事不對人」地檢討，並要求其改進，這是否屬於霸凌中的「要求過高」？","options":{"A":"A. 是，給部屬太大壓力就是霸凌","B":"B. 否，只要是基於業務必要之指導且口氣合理，不算霸凌","C":"C. 只要部屬不舒服就算霸凌","D":"D. 視部屬是否提出檢舉而定"},"answer":"B","explanation":"績效管理不等於霸凌。只要主管基於客觀事實、業務必要性且未逾越合理範疇，即便口氣嚴肅，仍屬於合法的管理權行使。"},{"id":"245","role":"主管","category":"法律程序與責任","difficulty":"中難度","question":"受僱者向機關內部申訴性騷擾後，雇主應於多久內登錄勞動部指定之系統？","options":{"A":"A. 立即登錄","B":"B. 受理翌日起 7 個工作日內","C":"C. 結案後登錄即可","D":"D. 每月彙整一次登錄"},"answer":"B","explanation":"雇主受理翌日起 7 個工作日內應完成系統登錄。逾期未報將被認定為行政管理缺失，影響合規評等。"},{"id":"246","role":"主管","category":"職場霸凌防治","difficulty":"中難度","question":"若機關主管對於「在外工作」之部屬（如房仲、記者、查勤員）發生性騷擾，應採取何種預防措施？","options":{"A":"A. 因為在外工作難以監控，主管無預防義務","B":"B. 為工作環境進行風險辨識、提供必要防護並事前詳為告知","C":"C. 要求外勤人員必須自備錄音筆","D":"D. 規定所有業務僅能在公司內洽談"},"answer":"B","explanation":"雇主義務延伸至「虛擬或流動職場」。主管仍負有風險辨識義務，應提供防護裝備或告知（如改派兩人同行）以盡防治之責。"},{"id":"247","role":"主管","category":"法律程序與責任","difficulty":"中難度","question":"當主管對霸凌案作成決定後，申復人提出「足以影響原認定之新事證」提起申復，申復審議期限得展延幾日？","options":{"A":"A. 10 日","B":"B. 30 日","C":"C. 1 個月","D":"D. 無限期延展"},"answer":"B","explanation":"申復案件若涉及再行調查，決定期限得展延 30 日。主管應掌握此延展規定，避免程序倉促而影響公正性。"},{"id":"248","role":"主管","category":"法律程序與責任","difficulty":"中難度","question":"機關內僱用受僱者達 100 人以上時，性騷擾調查小組應包含至少幾位外部專業人士？","options":{"A":"A. 全部成員皆應外部","B":"B. 至少 1 位以上之外部專業人士","C":"C. 至少 3 位","D":"D. 由首長決定，外部專家非必要"},"answer":"B","explanation":"100 人以上企業必須引入外部專家，旨在導入客觀專業視角，減少組織內部既有權力架構對調查之干擾。"},{"id":"249","role":"主管","category":"性騷擾防治","difficulty":"中難度","question":"若行為人已離職，該主管所屬機關對該員於任職期間發生之性騷擾案，應如何處置？","options":{"A":"A. 因為已離職，結案不予調查","B":"B. 申訴應由行為發生時之服務機關受理並續行調查","C":"C. 僅需口頭告知受害者","D":"D. 停止所有勞保給付"},"answer":"B","explanation":"「雇主責任」不因人員離職而消滅。主管仍應依程序受理調查，以釐清任職期間之法律責任並採取補救。"},{"id":"250","role":"主管","category":"職場霸凌防治","difficulty":"中難度","question":"身為主管，在霸凌案結案後，最重要的後續義務為何？","options":{"A":"A. 確保全組簽署保密協定，禁止再提此事","B":"B. 進行事後追蹤、考核及監督，避免相同事件再次發生或報復","C":"C. 要求申訴人立即請假調養","D":"D. 對行為人進行公開批鬥"},"answer":"B","explanation":"結案後的「合規追蹤」是預防再發的關鍵。主管應監督是否有報復行為發生，並評估組織氣氛是否修復。"},{"id":"251","role":"主管","category":"法律程序與責任","difficulty":"中高難度","question":"依據《性別平等工作法》第 27 條，當主管利用職權進行「權勢性騷擾」時，法院得酌定損害額最高幾倍之「懲罰性賠償金」？","options":{"A":"A. 1 倍","B":"B. 3 倍","C":"C. 5 倍","D":"D. 10 倍"},"answer":"B","explanation":"依據《性別平等工作法》第 27 條，行為人為具權勢地位者，法院得酌定 1 至 3 倍懲罰性賠償。若為最高負責人則可處 3 至 5 倍。"},{"id":"252","role":"主管","category":"法律程序與責任","difficulty":"中高難度","question":"身為主管，在知悉職場霸凌申訴後，若決定採取「隔離措施」，下列何種做法符合法規之正當程序？","options":{"A":"A. 應優先徵得申訴人之意願，且不得對其薪資等勞動條件作不利之變更","B":"B. 為了保護被害人，應立即將其降調至較不繁忙的部門，即便薪資減少亦可","C":"C. 應強制申訴人與被申訴人同時留職停薪直到調查結束","D":"D. 只要主管認為有必要，無須告知申訴人即可更換其辦公地點"},"answer":"A","explanation":"「隔離措施」屬於調查處置程序。其法律效果必須是保護而非懲罰，應徵詢申訴人意願且絕對禁止變更勞動條件（如減薪或降職）。"},{"id":"253","role":"主管","category":"法律程序與責任","difficulty":"中高難度","question":"依據 2026 年施行的《職場霸凌防治措施準則》，僱用勞工人數在 100 人以上之雇主，其「調查小組」之外部專業人士比例有何強制規定？","options":{"A":"A. 不得少於三分之一","B":"B. 不得少於二分之一","C":"C. 不得少於三分之二","D":"D. 必須全部由外部人士組成"},"answer":"B","explanation":"大型企業之調查小組外部比例應達二分之一，此為法定組成規範。違反比例將導致調查程序出現重大瑕疵，進而影響決議效力。"},{"id":"254","role":"主管","category":"法律程序與責任","difficulty":"中高難度","question":"若機關首長涉及性騷擾且「情節重大」，上級機關於調查期間得採取的先行措施，下列敘述何者正確？","options":{"A":"A. 得先行停止其職務，且停職期間不發給任何薪資","B":"B. 得先行停止或調整其職務，且停職期間得發給半數之本俸（年功俸）","C":"C. 僅能調整職務，絕對不可停止職務","D":"D. 必須等地方主管機關裁罰確定後，才可調整職務"},"answer":"B","explanation":"根據《性別平等工作法》第 32 條之 3，為確保調查公正，情節重大時得先行停職或調職，並依法發給半數本俸，兼顧程序正義與當事人權益。"},{"id":"255","role":"主管","category":"法律程序與責任","difficulty":"中高難度","question":"在職場霸凌調查中，關於「利益迴避」之規定，若調查人員與當事人曾為「前配偶」關係，應如何處理？","options":{"A":"A. 既然已離婚即無法律親屬關係，無須迴避","B":"B. 法律明定「前配偶」應自行迴避，雇主亦應主動命其迴避","C":"C. 只要當事人雙方均不反對，即可參與調查","D":"D. 僅需在調查報告中註明，無須迴避"},"answer":"B","explanation":"根據防治準則，前配偶關係在法律上仍屬應主動迴避範疇。主管必須落實此合規紅線，以維持調查之客觀透明度。"},{"id":"256","role":"主管","category":"性騷擾防治","difficulty":"中高難度","question":"主管若在「非工作時間」對同仁進行持續性騷擾，且該行為與其「利用職務機會」有關，應優先適用哪部法律？","options":{"A":"A. 性騷擾防治法","B":"B. 性別平等工作法","C":"C. 跟蹤騷擾防制法","D":"D. 社會秩序維護法"},"answer":"B","explanation":"即便不在辦公室或上班時間，只要行為具持續性或涉及職務權勢關係，均優先適用《性別平等工作法》，主管應按內規進行處置。"},{"id":"257","role":"主管","category":"法律程序與責任","difficulty":"中高難度","question":"身為主管，當部屬遭受性騷擾而提出申訴時，雇主應於多久內將受理情形登錄主管機關指定之系統？","options":{"A":"A. 立即登錄","B":"B. 受理翌日起 7 個工作日內","C":"C. 調查結案後 10 日內","D":"D. 每月月底統一登錄"},"answer":"B","explanation":"受理翌日起 7 個工作日內完成系統登錄是法定的行政義務。主管應確保人事單位即時作業，避免漏報衍生法律風險。"},{"id":"258","role":"主管","category":"性騷擾防治","difficulty":"中高難度","question":"在性騷擾防治中，所謂「敵意式性騷擾」之認定，主管應具備之判斷準則不包含下列何者？","options":{"A":"A. 造成使人心生畏怖、感受敵意或冒犯之情境","B":"B. 不當影響被害人之工作表現","C":"C. 損害被害人之人格尊嚴","D":"D. 必須有具體的職務利益交換條件（如以升遷換取服從）"},"answer":"D","explanation":"選項 D 屬於「交換式性騷擾」。敵意式性騷擾核心在於「環境侵害」，只要讓受教者感到不安、人格受損，即便沒有利益交換亦成立。"},{"id":"259","role":"主管","category":"職場霸凌防治","difficulty":"中高難度","question":"關於職場霸凌中的「名譽侵害」樣態，下列何者屬於主管應介入處理之霸凌行為？","options":{"A":"A. 在績效評談會議中，依據事實檢討部屬的工作缺失","B":"B. 為破壞特定勞工職場地位，在同事間刻意散布其不實之負面訊息","C":"C. 依照公司規定，將表現優異者公開表揚","D":"D. 在小組討論中，針對業務流程進行辯論"},"answer":"B","explanation":"惡意散布不實訊息、謠言或揭露私人生活以破壞部屬名譽，屬於霸凌中之「名譽侵害」，主管知悉後負有糾正及調查之責。"},{"id":"260","role":"主管","category":"法律程序與責任","difficulty":"中高難度","question":"主管在主持職場霸凌訪談時，依規範應如何確保調查程序之保密與公平？","options":{"A":"A. 為了釐清真相，應令申訴人與被申訴人當面對質","B":"B. 訪談紀錄應以錄音影輔助並作成紀錄，但不得令當事人間對質","C":"C. 訪談後應將紀錄公告於公司內部群組以示透明","D":"D. 調查報告應包含行為人的所有私人聯絡資訊"},"answer":"B","explanation":"「禁止對質」是法規對程序正義的要求。主管應透過錄音影存證，並採取個別訪談來釐清事實，以保護隱私並防止衝突擴大。"},{"id":"261","role":"主管","category":"法律程序與責任","difficulty":"中高難度","question":"若機關內發生性騷擾，經調查屬實後，主管機關裁處雇主罰鍰後，除繳納罰鍰外，雇主尚須面臨何種公示處分？","options":{"A":"A. 負責人應入獄服刑","B":"B. 主管機關應公布雇主名稱、負責人姓名及處分資訊","C":"C. 公司應立即宣告破產","D":"D. 全體主管應集體辭職"},"answer":"B","explanation":"根據《性別平等工作法》，公布負責人姓名是強制性的公示義務。這不僅損及品牌聲譽，更會影響後續公共標案或補助之申請資格。"},{"id":"262","role":"主管","category":"性騷擾防治","difficulty":"中高難度","question":"針對僱用人數在 30 人以上之雇主，對於「主管職務者」實施性騷擾防治教育訓練的頻率要求為何？","options":{"A":"A. 僅需在升任主管時實施一次","B":"B. 每半年實施兩次","C":"C. 每年定期舉辦","D":"D. 由主管視需求自行決定"},"answer":"C","explanation":"法律要求主管每年應「定期」接受防治教育訓練，旨在持續更新法律知能並維持高度的性別平等意識。"},{"id":"263","role":"主管","category":"職場霸凌防治","difficulty":"中高難度","question":"身為主管，當部屬因遭受職場霸凌導致身心受創，若機關規模達 500 人以上，雇主應提供至少幾次心理諮商協助？","options":{"A":"A. 1 次","B":"B. 2 次","C":"C. 5 次","D":"D. 法律無此規定"},"answer":"B","explanation":"合規企業應提供必要的「事後支持」。大型雇主應視請求提供至少 2 次心理諮商，這也是企業減輕損害賠償責任的有利事實證明。"},{"id":"264","role":"主管","category":"法律程序與責任","difficulty":"中高難度","question":"職場霸凌調查報告完成後，申訴處理單位應於多久內作成「申訴成立與否」之決定？","options":{"A":"A. 10 個工作日","B":"B. 15 日","C":"C. 1 個月","D":"D. 2 個月"},"answer":"C","explanation":"調查報告產出後，內部委員會應在 1 個月內決議並通知雙方。主管應掌握此行政期限，避免因延宕被認定程序瑕疵。"},{"id":"265","role":"主管","category":"法律程序與責任","difficulty":"中高難度","question":"若受僱者（申訴人）對職場霸凌決定不服提出「申復」，主管應於接獲後幾日內召開會議？","options":{"A":"A. 3 日","B":"B. 7 日","C":"C. 10 個工作日","D":"D. 30 日"},"answer":"C","explanation":"法律要求應於 10 個工作日內啟動申復會議。此為「時效性」法務義務，逾期將損及當事人行政救濟權益。"},{"id":"266","role":"主管","category":"法律程序與責任","difficulty":"中高難度","question":"當主管對霸凌案作成決定後，若申復人提出「足以影響原認定之新事證」且需再行調查，申復決定之期限得延長多久？","options":{"A":"A. 10 日","B":"B. 30 日","C":"C. 60 日","D":"D. 不得延長"},"answer":"B","explanation":"當發現新事實（如關鍵對話錄音或新證人）需重啟調查時，申復決定期限可合法延長 30 日，以確保最終認定之準確。"},{"id":"267","role":"主管","category":"法律程序與責任","difficulty":"中高難度","question":"主管機關在審核雇主之職場霸凌調查結果時，若認定程序有「重大瑕疵」，主管機關依法得命令雇主採取何種行動？","options":{"A":"A. 沒收公司當年營業額","B":"B. 要求雇主重新調查，雇主不得拒絕","C":"C. 註銷該公司的營利事業登記","D":"D. 強制所有員工參加 100 小時教育訓練"},"answer":"B","explanation":"主管機關具有「命令重行調查」權。若程序（如小組比例）違法，雇主必須配合重新啟動調查，不得以「已結案」為由拒絕。"},{"id":"268","role":"主管","category":"職場霸凌防治","difficulty":"中高難度","question":"在職場霸凌防治中，所謂「權力濫用」的「要求過低」樣態，常見的主觀意圖為何？","options":{"A":"A. 減輕員工負擔，維持其身心平衡","B":"B. 基於逼退或羞辱勞工之意圖，讓高階人才處理低階助理工作","C":"C. 因應勞工能力提升而給予的獎勵","D":"D. 正常的職務輪調，旨在培養全方位人才"},"answer":"B","explanation":"「要求過低」是另一種形式的霸凌，目的是打擊勞工尊嚴，使其因自卑或無聊而自行離職。主管應平衡適性管理與職等期待。"},{"id":"269","role":"主管","category":"法律程序與責任","difficulty":"中高難度","question":"若受僱者遭受性騷擾致生法律訴訟，雇主應給予「公假」。若主管惡意拒絕給予公假，依法可處多少罰鍰？","options":{"A":"A. 1 萬元至 5 萬元","B":"B. 2 萬元至 30 萬元","C":"C. 10 萬元以上","D":"D. 僅口頭警告，無罰鍰"},"answer":"B","explanation":"拒予公假違反《性別平等工作法》強制性規定，除罰鍰外，單位名稱與負責人亦會被公示，屬嚴重的企業合規負面事件。"},{"id":"270","role":"主管","category":"性騷擾防治","difficulty":"中高難度","question":"關於「跟蹤騷擾」與職場主管之關聯，行為人攜帶凶器對部屬進行與性有關之跟騷，最高可處幾年有期徒刑？","options":{"A":"A. 1 年","B":"B. 3 年","C":"C. 5 年","D":"D. 10 年"},"answer":"C","explanation":"攜帶凶器（具殺傷力之物）進行跟蹤騷擾，屬於刑事加重罪名。主管知悉後應主動協助部屬報警，並採取必要的物理環境防護。"},{"id":"271","role":"主管","category":"性騷擾防治","difficulty":"中高難度","question":"主管因部屬提起性騷擾申訴而對其考績評定為「丁等」且無正當理由，此舉違反了哪項核心原則？","options":{"A":"A. 比例原則","B":"B. 報復禁止原則（不當差別待遇禁止）","C":"C. 指揮監督原則","D":"D. 資訊透明原則"},"answer":"B","explanation":"「報復禁止」是性平法的核心。主管不得因部屬行使法律權利（申訴或作證）而對其進行任何形式的職涯不利處分。"},{"id":"272","role":"主管","category":"法律程序與責任","difficulty":"中高難度","question":"在性騷擾申訴程序中，申訴人若想「撤回」申訴，主管應告知其撤回後之影響。下列敘述何者正確？","options":{"A":"A. 隨時皆可撤回，且可就同一事由重複申訴多次","B":"B. 得於決議通知書送達前撤回，且撤回後除有新證據外，不得就同一事由再申訴","C":"C. 只要進入調查，絕對不可撤回","D":"D. 撤回必須經被申訴人同意才生效"},"answer":"B","explanation":"申訴人享有撤回權，但主管應告知「一事不再理」原則。除非發現新證據，否則撤回後不得再次就同一事件提起內部申訴。"},{"id":"273","role":"主管","category":"性騷擾防治","difficulty":"中高難度","question":"主管在處理涉及「派遣勞工」之性騷擾申訴時，應負擔之調查義務為何？","options":{"A":"A. 僅需交由派遣公司處理，要派單位無須介入","B":"B. 要派單位與派遣公司應共同調查，並將結果通知雙方及當事人","C":"C. 被害人應自行承擔風險","D":"D. 僅需提供監視器畫面，其餘調查皆不參與"},"answer":"B","explanation":"派遣與要派單位「均為雇主」。在要派場所發生事件時，要派主管應主動參與共同調查與保護措施，不可推諉給派遣公司。"},{"id":"274","role":"主管","category":"法律程序與責任","difficulty":"中高難度","question":"主管執行職場霸凌防治之「執行紀錄」（如訪談、調查報告），其法定的最短保存期限為何？","options":{"A":"A. 1 年","B":"B. 3 年","C":"C. 5 年","D":"D. 永久保存"},"answer":"B","explanation":"法律規定執行紀錄至少保存 3 年，以備主管機關查核或未來法律訴訟之證據使用。主管應建立規範的檔案管理機制。"},{"id":"275","role":"主管","category":"法律程序與責任","difficulty":"中高難度","question":"在機關首長為行為人之職場霸凌案件中，勞工提起申訴之權利為何？","options":{"A":"A. 必須先向機關人事單位提出，由首長親自審核","B":"B. 得「逕向」直轄市或縣（市）主管機關提起申訴","C":"C. 僅能透過工會向法院提告，無須向政府申訴","D":"D. 依機關內部流程，最高只能向副首長申訴"},"answer":"B","explanation":"當申訴對象為最高負責人時，為避嫌並維護公正性，勞工可跳過內部申訴，直接向地方勞工行政主管機關尋求救濟。"},{"id":"276","role":"主管","category":"性騷擾防治","difficulty":"高難度","question":"身為主管，當部屬遭受客戶（不特定人）性騷擾時，下列哪項「糾正及補救措施」是不合適的？","options":{"A":"A. 協助被害人保全監視器畫面或對話紀錄等證據","B":"B. 調整工作環境或保護措施（如改派兩名人員共同值勤）","C":"C. 告知部屬客戶至上，應隱忍以維持公司商譽","D":"D. 協助被害人向警察機關提出申訴"},"answer":"C","explanation":"要求被害人「隱忍」已違反雇主立即糾正補救義務。主管應優先保障員工安全與尊嚴，不應以商譽為由規避防治責任。"},{"id":"277","role":"主管","category":"法律程序與責任","difficulty":"高難度","question":"「權勢性騷擾」之時效規定，若被申訴人為「主管」，受僱者離職後提起申訴的限制為何？","options":{"A":"A. 行為發生起 1 年內","B":"B. 知悉起 2 年，發生起 5 年","C":"C. 離職之日起 1 年內，但自行為終了逾 10 年者不予受理","D":"D. 無時效限制"},"answer":"C","explanation":"為防止權勢影響力阻礙申訴，法律規定權勢性騷擾者離職後仍有 1 年申訴期。主管應認知即便部屬離職，其法律責任亦未立即解除。"},{"id":"278","role":"主管","category":"法律程序與責任","difficulty":"高難度","question":"主管在「申復審議會議」中發現原調查小組之組成「任一性別少於三分之一」，此在法律上被定義為？","options":{"A":"A. 程序輕微瑕疵，不影響結果","B":"B. 重大瑕疵，應組成申復調查小組再行調查","C":"C. 由主管機關口頭警告即可","D":"D. 行為人之權利，申訴人不得提出異議"},"answer":"B","explanation":"「任一性別不得少於三分之一」是性平法定的組成門檻。違反此項即屬「重大程序瑕疵」，會導致原調查決定被撤銷。"},{"id":"279","role":"主管","category":"職場霸凌防治","difficulty":"高難度","question":"身為主管，當部屬「拒絕配合」職場霸凌調查訪談時，應採取的合規處理方式為何？","options":{"A":"A. 直接撤銷該申訴案，並視為不成立","B":"B. 告知其限期配合，屆期仍不配合者，得依現有證據作成調查報告","C":"C. 以曠職論處直到其配合為止","D":"D. 強制帶往辦公室禁閉直到其發言"},"answer":"B","explanation":"調查過程應秉持程序透明。若當事人不配合，主管應先行催告（限期補正），屆期未配合則採既存事證認定。"},{"id":"280","role":"主管","category":"法律程序與責任","difficulty":"高難度","question":"依據《性別平等工作法》第 27 條，雇主連帶損害賠償責任之「免責」要件為何？","options":{"A":"A. 只要雇主不知情即可免責","B":"B. 只要行為人已道歉即可免責","C":"C. 雇主證明已遵行法定防治規定，且對事情發生已盡力防止者","D":"D. 雇主絕對無法免責，必須負擔全部賠償"},"answer":"C","explanation":"根據《性別平等工作法》第 27 條，雇主若能提出具體的「防治努力」證據（如教育訓練紀錄、完善申訴管道），得免除與行為人之連帶賠償責任。"},{"id":"281","role":"主管","category":"法律程序與責任","difficulty":"高難度","question":"身為主管，在撰寫霸凌調查報告時，關於「處理建議」應包含哪些內容始為完整？","options":{"A":"A. 僅需建議被害人暫時休息","B":"B. 應包含對行為人之懲戒建議、被害人之保護及預防再發措施","C":"C. 應建議被申訴人私下賠償金額","D":"D. 應建議公司關閉發生事件的部門"},"answer":"B","explanation":"調查報告之「處理建議」是合規管理的核心。應針對行為人提出符合比例原則之懲戒，並對被害人提供具體的「職場修復」與環境改善方案。"},{"id":"282","role":"主管","category":"性騷擾防治","difficulty":"高難度","question":"主管對於「在外工作」（如外勤、派駐）之部屬發生性騷擾，依法應負擔何種預防責任？","options":{"A":"A. 因為在外工作難以掌控，主管無預防責任","B":"B. 應進行工作環境性騷擾風險類型辨識、提供必要防護並事前告知","C":"C. 要求外勤人員必須自行配戴防身警報器，否則自負其責","D":"D. 停止所有外派業務，全面改為辦公室內工作"},"answer":"B","explanation":"主管對外勤人員仍負有風險辨識與教育義務（如提醒特定客戶之行為習性）。落實告知義務是避免雇主責任的法律基礎。"},{"id":"283","role":"主管","category":"職場霸凌防治","difficulty":"高難度","question":"關於職場霸凌定義中的「持續性」，主管在判斷「情節重大」者時，有何特別限制？","options":{"A":"A. 依然必須發生三個月以上才算重大","B":"B. 情節重大者，「不以持續發生為必要」，單次嚴重行為亦可構成","C":"C. 必須由工會一致認定才算重大","D":"D. 必須涉及肢體暴力才算重大"},"answer":"B","explanation":"雖霸凌通常具持續性，但針對肢體暴力、嚴重威脅或顯著人格侮辱等「情節重大」者，單次行為即可判定成立。主管不可因其僅發生一次而拒絕處置。"},{"id":"284","role":"主管","category":"法律程序與責任","difficulty":"高難度","question":"若主管機關認定雇主之職場霸凌調查程序有「重大瑕疵」並命令「重新調查」，主管應如何處理？","options":{"A":"A. 提出行政訴訟以抗拒重新調查","B":"B. 應組成符合規範之小組重新調查，雇主不得拒絕","C":"C. 僅需補簽之前的調查表即可","D":"D. 這是
